{% extends "base.html" %}

{% block title %}智能简历构建器{% endblock %}

{% block content %}
<!-- 引入 html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<div class="resume-view-switch">
    <button type="button" id="workspace-editor-btn" class="btn btn-sm btn-primary" onclick="setWorkspaceView('editor')">编辑</button>
    <button type="button" id="workspace-preview-btn" class="btn btn-sm btn-ghost" onclick="setWorkspaceView('preview')">预览</button>
</div>

<div class="resume-workspace" id="resume-workspace" data-active-view="editor">

    <!-- 左侧：编辑区 -->
    <div class="resume-editor-pane bg-base-100 rounded-xl shadow-sm border border-base-200 overflow-hidden" id="editor-pane">

        <!-- 工具栏 -->
        <div class="resume-editor-toolbar p-4 border-b border-base-200 flex justify-between items-center bg-base-200/50">
            <div class="flex items-center gap-2">
                <span class="font-bold text-lg">📝 编辑简历</span>
                <span id="save-status" class="text-xs text-base-content/50 ml-2">已保存</span>
            </div>
            <div class="flex gap-2">
                <button onclick="saveResume()" class="btn btn-sm btn-primary text-white">
                    保存
                </button>
            </div>
        </div>

        <div class="resume-editor-body">
            <aside class="resume-section-nav" id="section-nav"></aside>
            <section class="resume-section-editor" id="section-editor"></section>
        </div>
    </div>

    <!-- 右侧：预览区 -->
    <div class="resume-preview-pane bg-base-200/50 rounded-xl border border-base-200" id="preview-pane">
        
        <!-- 预览工具栏 -->
        <div class="p-3 border-b border-base-200 flex justify-between items-center">
            <select class="select select-sm select-bordered" onchange="changeTemplate(this.value)">
                <option value="modern">现代简约 (Modern)</option>
                <option value="classic">经典商务 (Classic)</option>
                <option value="ats">ATS专业 (ATS)</option>
                <option value="campus">校园清新 (Campus)</option>
                <option value="minimal">极简单栏 (Minimal)</option>
                <option value="business">商务双栏 (Business)</option>
                <option value="creative">创意彩色 (Creative)</option>
                <option value="tech">深色科技 (Tech)</option>
            </select>
            <div class="flex gap-2">
                <button onclick="fitOnePage()" class="btn btn-sm btn-accent text-white gap-2" id="btn-fit-one-page">
                    智能一页纸
                </button>
                <button onclick="exportPDF()" class="btn btn-sm btn-secondary text-white gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    导出 PDF
                </button>
            </div>
        </div>

        <!-- 预览画布 -->
        <div class="flex-1 overflow-y-auto p-4 flex justify-center bg-gray-100">
            <div id="resume-preview" class="bg-white shadow-xl origin-top transition-transform" style="width: 210mm; min-height: 297mm; padding: 0;">
                <!-- 简历内容将由 JS 渲染 -->
            </div>
        </div>
    </div>
</div>

<!-- 样式 -->
<style>
    /* Print Styles - Global override for clean printing */
    @media print {
        /*
         * Keep backgrounds/gradients/shadows when printing or saving as PDF.
         * Browsers often try to "economize" colors in print mode unless we opt in.
         */
        html, body {
            -webkit-print-color-adjust: exact !important;
            -moz-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }

        body {
            visibility: hidden;
            background: white;
            margin: 0;
            padding: 0;
        }

        .resume-workspace {
            display: block !important;
            height: auto !important;
            min-height: 0 !important;
        }

        .resume-view-switch,
        .resume-editor-pane {
            display: none !important;
        }

        .resume-preview-pane {
            display: block !important;
            background: white !important;
            border: 0 !important;
        }
        
        #resume-preview {
            -webkit-print-color-adjust: exact !important;
            -moz-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
            visibility: visible;
            position: absolute;
            left: 0;
            top: 0;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            box-shadow: none !important;
            border: none !important;
            transform: none !important; /* Reset any scaling */
            z-index: 9999;
            background: white;
        }

        #resume-preview * {
            visibility: visible;
        }

        #resume-preview *,
        #resume-preview *::before,
        #resume-preview *::after {
            -webkit-print-color-adjust: exact !important;
            -moz-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }

        /* Hide headers, footers, and page info */
        @page {
            margin: 0;
            size: auto;
        }
    }

    .resume-view-switch {
        display: none;
        gap: 8px;
        margin-bottom: 12px;
        padding: 6px;
        width: fit-content;
        background: hsl(var(--b1));
        border: 1px solid hsl(var(--b2));
        border-radius: 10px;
        box-shadow: 0 8px 24px rgb(15 23 42 / 0.08);
    }

    .resume-workspace {
        display: grid;
        grid-template-columns: minmax(520px, 1fr) minmax(520px, 1fr);
        gap: 24px;
        height: calc(100vh - 6rem);
        min-height: 620px;
    }

    .resume-editor-pane,
    .resume-preview-pane {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
    }

    .resume-editor-toolbar {
        flex: 0 0 auto;
    }

    .resume-editor-body {
        display: grid;
        grid-template-columns: 190px minmax(0, 1fr);
        gap: 14px;
        min-height: 0;
        flex: 1;
        padding: 14px;
        background: hsl(var(--b2) / 0.25);
    }

    .resume-section-nav {
        min-height: 0;
        overflow-y: auto;
        padding-right: 2px;
    }

    .resume-section-editor {
        min-width: 0;
        min-height: 0;
        overflow-y: auto;
        background: hsl(var(--b1));
        border: 1px solid hsl(var(--b2));
        border-radius: 12px;
        padding: 18px;
    }

    .section-nav-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        min-height: 48px;
        margin-bottom: 8px;
        padding: 6px;
        border: 1px solid hsl(var(--b2));
        border-radius: 10px;
        background: hsl(var(--b1));
        transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .section-nav-row.is-active {
        border-color: hsl(var(--p));
        background: hsl(var(--p) / 0.08);
        box-shadow: 0 8px 18px hsl(var(--p) / 0.12);
    }

    .section-nav-row.is-hidden {
        opacity: 0.62;
    }

    .section-nav-main {
        min-width: 0;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
    }

    .section-nav-icon {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: hsl(var(--b2));
        flex: 0 0 auto;
    }

    .section-nav-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .section-hidden-badge {
        display: block;
        margin-top: 2px;
        font-size: 11px;
        font-weight: 400;
        color: hsl(var(--bc) / 0.55);
    }

    .section-editor-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding-bottom: 14px;
        margin-bottom: 14px;
        border-bottom: 1px solid hsl(var(--b2));
    }

    .section-editor-kicker {
        font-size: 12px;
        color: hsl(var(--bc) / 0.55);
        margin-bottom: 2px;
    }

    .section-editor-title {
        font-size: 18px;
        font-weight: 800;
    }

    .section-form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
    }

    .section-form-grid .span-full {
        grid-column: 1 / -1;
    }

    .list-editor-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    #resume-preview {
        --resume-font-scale: 1;
        --resume-line-height: 1.6;
        --resume-section-margin-top: 20px;
        --resume-section-margin-bottom: 15px;
        --resume-section-padding-bottom: 5px;
        --resume-item-margin: 20px;
        --resume-item-header-margin: 4px;
        --resume-desc-margin: 5px;
        --resume-modern-padding-y: 30px;
        --resume-modern-main-padding-x: 30px;
        --resume-modern-sidebar-padding-x: 20px;
        --resume-classic-padding: 40px;
        --resume-classic-header-padding: 20px;
        --resume-classic-header-margin: 20px;
        --resume-contact-margin: 10px;
        --resume-skill-padding-y: 4px;
        --resume-skill-padding-x: 8px;
        --resume-skill-margin-bottom: 6px;
    }

    /* Modern Template Styles */
    .section-hide-toggle {
        position: relative;
        z-index: 20;
        pointer-events: auto;
    }
    .section-hide-toggle input {
        pointer-events: auto;
    }

    .resume-modern { font-family: 'Segoe UI', sans-serif; color: #333; line-height: var(--resume-line-height); display: flex; min-height: 297mm; font-size: calc(14px * var(--resume-font-scale)); }
    .resume-modern .sidebar { width: 30%; background: #f8f9fa; border-right: 1px solid #eee; padding: var(--resume-modern-padding-y) var(--resume-modern-sidebar-padding-x); }
    .resume-modern .main { width: 70%; padding: var(--resume-modern-padding-y) var(--resume-modern-main-padding-x); }
    .resume-modern .avatar { width: 100px; height: 100px; background: #ddd; border-radius: 50%; margin: 0 auto 20px; display: block; object-fit: cover; }
    .resume-modern .name { font-size: calc(24px * var(--resume-font-scale)); font-weight: bold; text-align: center; color: #2c3e50; }
    .resume-modern .target { text-align: center; color: #7f8c8d; margin-bottom: calc(30px * var(--resume-font-scale)); font-size: calc(14px * var(--resume-font-scale)); }
    .resume-modern .section-title { font-size: calc(16px * var(--resume-font-scale)); font-weight: bold; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: var(--resume-section-padding-bottom); margin: var(--resume-section-margin-top) 0 var(--resume-section-margin-bottom); }
    .resume-modern .contact-item { font-size: calc(13px * var(--resume-font-scale)); margin-bottom: calc(8px * var(--resume-font-scale)); display: flex; gap: 8px; align-items: center; color: #555; }
    .resume-modern .skill-item { background: #e8f4fd; color: #2980b9; padding: var(--resume-skill-padding-y) var(--resume-skill-padding-x); border-radius: 4px; font-size: calc(12px * var(--resume-font-scale)); margin-bottom: var(--resume-skill-margin-bottom); display: inline-block; margin-right: 4px; }
    
    .resume-modern .item { margin-bottom: var(--resume-item-margin); }
    .resume-modern .item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: var(--resume-item-header-margin); }
    .resume-modern .item-title { min-width: 0; font-weight: bold; font-size: calc(16px * var(--resume-font-scale)); color: #34495e; overflow-wrap: anywhere; word-break: break-word; }
    .resume-modern .item-subtitle { font-weight: 600; font-size: calc(14px * var(--resume-font-scale)); color: #7f8c8d; }
    .resume-modern .item-date { flex: 0 0 auto; max-width: 35%; text-align: right; font-size: calc(12px * var(--resume-font-scale)); color: #95a5a6; overflow-wrap: anywhere; }
    .resume-modern .item-desc { font-size: calc(13px * var(--resume-font-scale)); color: #555; white-space: pre-line; margin-top: var(--resume-desc-margin); }
    .resume-modern .award-item { margin-bottom: calc(var(--resume-item-margin) * 0.75); }
    .resume-modern .award-title { font-weight: bold; font-size: calc(15px * var(--resume-font-scale)); color: #34495e; line-height: 1.35; overflow-wrap: anywhere; word-break: break-word; }
    .resume-modern .award-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .resume-modern .award-badge { display: inline-flex; align-items: center; max-width: 100%; padding: 2px 7px; border-radius: 999px; background: #eef6fb; color: #607d8b; font-size: calc(11px * var(--resume-font-scale)); line-height: 1.35; overflow-wrap: anywhere; }

    /* Classic Template Styles */
    .resume-classic { font-family: 'Times New Roman', serif; color: #000; padding: var(--resume-classic-padding); line-height: var(--resume-line-height); font-size: calc(14px * var(--resume-font-scale)); }
    .resume-classic .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: var(--resume-classic-header-padding); margin-bottom: var(--resume-classic-header-margin); }
    .resume-classic .name { font-size: calc(28px * var(--resume-font-scale)); font-weight: bold; text-transform: uppercase; }
    .resume-classic .contact { font-size: calc(14px * var(--resume-font-scale)); margin-top: var(--resume-contact-margin); }
    .resume-classic .section-title { font-size: calc(16px * var(--resume-font-scale)); font-weight: bold; text-transform: uppercase; margin: var(--resume-section-margin-top) 0 var(--resume-section-margin-bottom); border-bottom: 1px solid #ccc; }
    .resume-classic .item { margin-bottom: var(--resume-item-margin); }
    .resume-classic .item-header { display: flex; justify-content: space-between; font-weight: bold; }
    .resume-classic .item-desc { font-size: calc(14px * var(--resume-font-scale)); margin-top: var(--resume-desc-margin); }

    .resume-ats,
    .resume-campus,
    .resume-minimal,
    .resume-business,
    .resume-creative,
    .resume-tech {
        min-height: 297mm;
        font-size: calc(13.5px * var(--resume-font-scale));
        line-height: var(--resume-line-height);
        overflow-wrap: anywhere;
        word-break: break-word;
    }
    .tpl-section { margin-top: var(--resume-section-margin-top); }
    .tpl-section:first-child { margin-top: 0; }
    .tpl-section-title { font-size: calc(15px * var(--resume-font-scale)); font-weight: 800; margin-bottom: var(--resume-section-margin-bottom); }
    .tpl-item { margin-bottom: var(--resume-item-margin); }
    .tpl-item-header { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; margin-bottom: var(--resume-item-header-margin); }
    .tpl-item-title { min-width: 0; font-weight: 800; font-size: calc(14px * var(--resume-font-scale)); }
    .tpl-item-date { flex: 0 0 auto; max-width: 34%; text-align: right; color: #73808a; font-size: calc(11.5px * var(--resume-font-scale)); overflow-wrap: anywhere; }
    .tpl-item-subtitle { color: #63707a; font-weight: 650; margin-bottom: 3px; }
    .tpl-item-desc { white-space: pre-line; color: #4a5560; margin-top: var(--resume-desc-margin); }
    .tpl-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tpl-chip { display: inline-flex; align-items: center; max-width: 100%; border-radius: 999px; padding: 2px 8px; font-size: calc(11px * var(--resume-font-scale)); line-height: 1.35; overflow-wrap: anywhere; }
    .tpl-contact { display: flex; flex-wrap: wrap; gap: 8px 14px; color: #5e6872; }
    .tpl-contact span { min-width: 0; overflow-wrap: anywhere; }
    .tpl-award-title { font-weight: 760; color: inherit; }
    .tpl-award-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

    .resume-ats { padding: 34px 42px; font-family: Arial, Helvetica, sans-serif; color: #202428; }
    .resume-ats .ats-header { border-bottom: 2px solid #202428; padding-bottom: 13px; margin-bottom: 18px; }
    .resume-ats .ats-name { font-size: calc(28px * var(--resume-font-scale)); font-weight: 800; letter-spacing: 0; }
    .resume-ats .ats-target { margin-top: 4px; color: #4a4f55; font-weight: 700; }
    .resume-ats .tpl-section-title { color: #202428; border-bottom: 1px solid #aeb6bf; padding-bottom: 4px; text-transform: uppercase; }
    .resume-ats .tpl-chip { background: #f1f3f5; color: #30363d; border: 1px solid #d8dde3; }

    .resume-minimal { padding: 42px 48px; font-family: 'Helvetica Neue', Arial, sans-serif; color: #24292f; }
    .resume-minimal .minimal-header { margin-bottom: 24px; }
    .resume-minimal .minimal-name { font-size: calc(30px * var(--resume-font-scale)); font-weight: 700; }
    .resume-minimal .minimal-target { margin-top: 6px; color: #6b7280; }
    .resume-minimal .tpl-section-title { color: #111827; border-left: 3px solid #111827; padding-left: 10px; }
    .resume-minimal .tpl-item { padding-bottom: 8px; border-bottom: 1px solid #eef0f2; }
    .resume-minimal .tpl-chip { background: #f7f7f8; color: #4b5563; }

    .resume-campus { padding: 30px 34px; font-family: 'Segoe UI', Arial, sans-serif; color: #254155; background: linear-gradient(180deg, #f6fffb 0, #fff 90px); }
    .resume-campus .campus-header { display: grid; grid-template-columns: minmax(0, 1fr) minmax(150px, 42%); gap: 16px; border-bottom: 3px solid #64c8b4; padding-bottom: 16px; margin-bottom: 18px; }
    .resume-campus .campus-header > * { min-width: 0; }
    .resume-campus .campus-header .tpl-contact { justify-content: flex-end; }
    .resume-campus .campus-name { font-size: calc(28px * var(--resume-font-scale)); font-weight: 850; color: #17445c; }
    .resume-campus .campus-target { color: #16876f; font-weight: 750; margin-top: 4px; }
    .resume-campus .tpl-section-title { color: #14745f; background: #e9faf5; border-radius: 999px; padding: 5px 12px; width: fit-content; }
    .resume-campus .tpl-chip { background: #e9faf5; color: #14745f; border: 1px solid #c7efe3; }

    .resume-business { display: grid; grid-template-columns: 32% 68%; min-height: 297mm; font-family: 'Segoe UI', Arial, sans-serif; color: #26313d; }
    .resume-business .business-side { background: #243447; color: #eef4f8; padding: 34px 22px; }
    .resume-business .business-main { padding: 34px 34px; }
    .resume-business .business-name { font-size: calc(26px * var(--resume-font-scale)); font-weight: 850; }
    .resume-business .business-target { color: #bfd0dc; margin-top: 6px; }
    .resume-business .business-side .tpl-section-title { color: #fff; border-bottom: 1px solid rgb(255 255 255 / 0.28); padding-bottom: 5px; }
    .resume-business .business-side .tpl-contact, .resume-business .business-side .tpl-item-desc, .resume-business .business-side .tpl-item-subtitle { color: #dce7ee; }
    .resume-business .business-main .tpl-section-title { color: #243447; border-bottom: 2px solid #d6a95f; padding-bottom: 5px; }
    .resume-business .tpl-chip { background: rgb(255 255 255 / 0.12); color: #eef4f8; border: 1px solid rgb(255 255 255 / 0.16); }

    .resume-creative { padding: 0; font-family: 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; color: #263238; background: #fff; }
    .resume-creative .creative-header { padding: 30px 36px 24px; background: linear-gradient(135deg, #ff8a65, #22a699); color: #fff; }
    .resume-creative .creative-name { font-size: calc(30px * var(--resume-font-scale)); font-weight: 850; }
    .resume-creative .creative-target { margin-top: 6px; font-weight: 700; opacity: 0.92; }
    .resume-creative .creative-body { padding: 28px 36px; }
    .resume-creative .tpl-section-title { color: #14796f; display: flex; align-items: center; gap: 8px; }
    .resume-creative .tpl-section-title::before { content: ""; width: 10px; height: 10px; border-radius: 999px; background: #ff8a65; flex: 0 0 auto; }
    .resume-creative .tpl-item { background: #f7fbfa; border-left: 4px solid #22a699; border-radius: 7px; padding: 10px 12px; }
    .resume-creative .tpl-chip { background: #fff3e0; color: #8a4b00; border: 1px solid #ffd8a8; }

    .resume-tech { display: grid; grid-template-columns: 34% 66%; min-height: 297mm; font-family: 'Segoe UI', Arial, sans-serif; color: #dbeafe; background: #0f172a; }
    .resume-tech .tech-side { background: #111827; padding: 34px 22px; border-right: 1px solid rgb(148 163 184 / 0.22); }
    .resume-tech .tech-main { background: #f8fafc; color: #1e293b; padding: 34px 34px; }
    .resume-tech .tech-name { font-size: calc(26px * var(--resume-font-scale)); font-weight: 850; color: #e0f2fe; }
    .resume-tech .tech-target { color: #67e8f9; margin-top: 6px; }
    .resume-tech .tech-side .tpl-section-title { color: #67e8f9; border-bottom: 1px solid rgb(103 232 249 / 0.32); padding-bottom: 5px; }
    .resume-tech .tech-side .tpl-contact, .resume-tech .tech-side .tpl-item-desc, .resume-tech .tech-side .tpl-item-subtitle { color: #cbd5e1; }
    .resume-tech .tech-main .tpl-section-title { color: #0f766e; border-bottom: 2px solid #14b8a6; padding-bottom: 5px; }
    .resume-tech .tpl-chip { background: rgb(20 184 166 / 0.14); color: #0f766e; border: 1px solid rgb(20 184 166 / 0.22); }

    @media (max-width: 1535px) {
        .resume-view-switch {
            display: flex;
        }

        .resume-workspace {
            display: block;
            height: calc(100vh - 9rem);
            min-height: 560px;
        }

        .resume-workspace[data-active-view="editor"] .resume-preview-pane,
        .resume-workspace[data-active-view="preview"] .resume-editor-pane {
            display: none;
        }

        .resume-editor-pane,
        .resume-preview-pane {
            height: 100%;
        }
    }

</style>

<script>
    // 初始数据 (从后端注入)
    let resumeData = {{ resume.content | tojson }} || {};
    const resumeId = {{ resume.id }};
    let currentTemplate = "{{ resume.template_id }}" || 'modern';
    let activeSection = 'basic';
    let activeWorkspaceView = 'editor';
    const sectionMeta = [
        { key: 'basic', icon: '👤', title: '基本信息' },
        { key: 'education', icon: '🎓', title: '教育背景' },
        { key: 'experience', icon: '💼', title: '实习/工作经历' },
        { key: 'projects', icon: '🚀', title: '项目经验' },
        { key: 'campus_experience', icon: '🏫', title: '校园内经历' },
        { key: 'awards', icon: '🏆', title: '获奖' },
        { key: 'skills', icon: '🛠', title: '技能与证书' }
    ];

    // 数据结构标准化初始化
    if (!resumeData.basic) resumeData.basic = {};
    if (!resumeData.education) resumeData.education = [];
    if (!resumeData.experience) resumeData.experience = [];
    if (!resumeData.projects) resumeData.projects = [];
    if (!resumeData.campus_experience || !Array.isArray(resumeData.campus_experience)) resumeData.campus_experience = [];
    if (resumeData.campus_experience.length === 0) resumeData.campus_experience.push({});
    if (!resumeData.awards || !Array.isArray(resumeData.awards)) resumeData.awards = [];
    if (resumeData.awards.length === 0) resumeData.awards.push({});
    if (!resumeData.skills) resumeData.skills = [];
    const defaultHiddenSections = {
        basic: false,
        education: false,
        experience: false,
        projects: false,
        campus_experience: false,
        awards: false,
        skills: false
    };
    if (!resumeData.hiddenSections || typeof resumeData.hiddenSections !== 'object' || Array.isArray(resumeData.hiddenSections)) resumeData.hiddenSections = {};
    resumeData.hiddenSections = { ...defaultHiddenSections, ...resumeData.hiddenSections };

    // Field-level visibility (fine-grained hide for individual form items)
    const defaultHiddenFields = {
        basic: {
            name: false,
            job_target: false,
            phone: false,
            email: false,
            location: false,
            self_evaluation: false
        }
    };
    if (!resumeData.hiddenFields || typeof resumeData.hiddenFields !== 'object' || Array.isArray(resumeData.hiddenFields)) resumeData.hiddenFields = {};
    resumeData.hiddenFields = {
        ...defaultHiddenFields,
        ...resumeData.hiddenFields,
        basic: { ...defaultHiddenFields.basic, ...(resumeData.hiddenFields.basic || {}) }
    };

    // Skills are stored as strings, so hide-by-skill-text for now.
    // (If you keep duplicates, hiding one will hide all same-text skills.)
    if (!resumeData.hiddenSkills || typeof resumeData.hiddenSkills !== 'object' || Array.isArray(resumeData.hiddenSkills)) resumeData.hiddenSkills = {};
    const layoutPresets = [
        { fontScale: 1, lineHeight: 1.6, sectionTop: 20, sectionBottom: 15, sectionPadding: 5, itemMargin: 20, itemHeaderMargin: 4, descMargin: 5, modernPaddingY: 30, modernMainPaddingX: 30, modernSidebarPaddingX: 20, classicPadding: 40, classicHeaderPadding: 20, classicHeaderMargin: 20, contactMargin: 10, skillPaddingY: 4, skillPaddingX: 8, skillMarginBottom: 6 },
        { fontScale: 0.98, lineHeight: 1.5, sectionTop: 18, sectionBottom: 13, sectionPadding: 4, itemMargin: 17, itemHeaderMargin: 3, descMargin: 4, modernPaddingY: 28, modernMainPaddingX: 28, modernSidebarPaddingX: 18, classicPadding: 36, classicHeaderPadding: 18, classicHeaderMargin: 18, contactMargin: 8, skillPaddingY: 3, skillPaddingX: 7, skillMarginBottom: 5 },
        { fontScale: 0.96, lineHeight: 1.42, sectionTop: 16, sectionBottom: 11, sectionPadding: 4, itemMargin: 14, itemHeaderMargin: 3, descMargin: 4, modernPaddingY: 26, modernMainPaddingX: 26, modernSidebarPaddingX: 17, classicPadding: 32, classicHeaderPadding: 16, classicHeaderMargin: 15, contactMargin: 7, skillPaddingY: 3, skillPaddingX: 7, skillMarginBottom: 4 },
        { fontScale: 0.94, lineHeight: 1.36, sectionTop: 14, sectionBottom: 9, sectionPadding: 3, itemMargin: 12, itemHeaderMargin: 2, descMargin: 3, modernPaddingY: 24, modernMainPaddingX: 24, modernSidebarPaddingX: 16, classicPadding: 29, classicHeaderPadding: 14, classicHeaderMargin: 13, contactMargin: 6, skillPaddingY: 2, skillPaddingX: 6, skillMarginBottom: 4 },
        { fontScale: 0.92, lineHeight: 1.32, sectionTop: 12, sectionBottom: 8, sectionPadding: 3, itemMargin: 10, itemHeaderMargin: 2, descMargin: 3, modernPaddingY: 22, modernMainPaddingX: 22, modernSidebarPaddingX: 15, classicPadding: 26, classicHeaderPadding: 12, classicHeaderMargin: 11, contactMargin: 5, skillPaddingY: 2, skillPaddingX: 6, skillMarginBottom: 3 },
        { fontScale: 0.9, lineHeight: 1.28, sectionTop: 10, sectionBottom: 6, sectionPadding: 2, itemMargin: 8, itemHeaderMargin: 2, descMargin: 2, modernPaddingY: 20, modernMainPaddingX: 20, modernSidebarPaddingX: 14, classicPadding: 24, classicHeaderPadding: 10, classicHeaderMargin: 10, contactMargin: 4, skillPaddingY: 2, skillPaddingX: 5, skillMarginBottom: 3 },
        { fontScale: 0.88, lineHeight: 1.22, sectionTop: 8, sectionBottom: 5, sectionPadding: 2, itemMargin: 6, itemHeaderMargin: 1, descMargin: 2, modernPaddingY: 18, modernMainPaddingX: 18, modernSidebarPaddingX: 12, classicPadding: 22, classicHeaderPadding: 8, classicHeaderMargin: 8, contactMargin: 3, skillPaddingY: 1, skillPaddingX: 5, skillMarginBottom: 2 }
    ];
    if (!resumeData.layout || typeof resumeData.layout !== 'object' || Array.isArray(resumeData.layout)) resumeData.layout = {};
    resumeData.layout = { density: 0, ...resumeData.layout };

    // 初始化页面
    document.addEventListener('DOMContentLoaded', () => {
        // Ensure list items have editor/preview meta.
        ensureListItemMeta('education');
        ensureListItemMeta('experience');
        ensureListItemMeta('projects');
        ensureListItemMeta('campus_experience');
        ensureListItemMeta('awards');

        // 填充表单
        fillForm();
        // 渲染预览
        renderPreview();
        // 设置选择框
        document.querySelector('select').value = currentTemplate;
        setWorkspaceView(activeWorkspaceView, false);

        // Auto-print check for dashboard "Download PDF"
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('print')) {
            // Delay slightly to ensure rendering is complete
            setTimeout(exportPDF, 800);
        }
    });

    // --- 表单逻辑 ---

    function generateLocalId() {
        return `i_${Math.random().toString(16).slice(2)}_${Date.now().toString(16)}`;
    }

    function ensureListItemMeta(type) {
        const list = resumeData[type];
        if (!Array.isArray(list)) return;
        list.forEach(item => {
            if (!item || typeof item !== 'object') return;
            if (!item._id) item._id = generateLocalId();
            if (typeof item._hidden !== 'boolean') item._hidden = false;
            if (!item._hiddenFields || typeof item._hiddenFields !== 'object' || Array.isArray(item._hiddenFields)) item._hiddenFields = {};
        });
    }

    function isFieldHidden(section, key) {
        return !!(resumeData.hiddenFields && resumeData.hiddenFields[section] && resumeData.hiddenFields[section][key]);
    }

    function updateHiddenField(section, key, hidden) {
        if (!resumeData.hiddenFields || typeof resumeData.hiddenFields !== 'object' || Array.isArray(resumeData.hiddenFields)) {
            resumeData.hiddenFields = {};
        }
        if (!resumeData.hiddenFields[section] || typeof resumeData.hiddenFields[section] !== 'object' || Array.isArray(resumeData.hiddenFields[section])) {
            resumeData.hiddenFields[section] = {};
        }
        resumeData.hiddenFields[section][key] = !!hidden;
        renderPreview();
        showUnsaved();
    }

    function isSkillHidden(skill) {
        return !!(resumeData.hiddenSkills && resumeData.hiddenSkills[String(skill)]);
    }

    function toggleHiddenSkillByIndex(index, hidden) {
        const skills = Array.isArray(resumeData.skills) ? resumeData.skills : [];
        const skill = skills[index];
        if (!skill) return;
        if (!resumeData.hiddenSkills || typeof resumeData.hiddenSkills !== 'object' || Array.isArray(resumeData.hiddenSkills)) {
            resumeData.hiddenSkills = {};
        }
        if (hidden) {
            resumeData.hiddenSkills[String(skill)] = true;
        } else {
            delete resumeData.hiddenSkills[String(skill)];
        }
        renderSkillsHideList();
        renderPreview();
        showUnsaved();
    }

    function renderSkillsHideList() {
        const container = document.getElementById('skills-hide-list');
        if (!container) return;
        const skills = (Array.isArray(resumeData.skills) ? resumeData.skills : []).filter(s => String(s || '').trim());
        if (skills.length === 0) {
            container.innerHTML = '';
            return;
        }

        container.innerHTML = skills.map((skill, idx) => {
            const hidden = isSkillHidden(skill);
            return `
                <div class="flex items-center justify-between gap-3 border border-base-200 rounded-lg px-3 py-2 ${hidden ? 'opacity-60' : ''}">
                    <div class="min-w-0">
                        <div class="text-sm font-medium truncate">${escapeHtml(skill)}</div>
                    </div>
                    <label class="label cursor-pointer gap-2 p-0" onclick="event.stopPropagation()">
                        <span class="label-text text-xs">隐藏</span>
                        <input type="checkbox" class="checkbox checkbox-xs" ${hidden ? 'checked' : ''} onchange="toggleHiddenSkillByIndex(${idx}, this.checked)">
                    </label>
                </div>
            `;
        }).join('');
    }

    function toggleItemHidden(type, index, hidden) {
        if (!Array.isArray(resumeData[type]) || !resumeData[type][index]) return;
        ensureListItemMeta(type);
        resumeData[type][index]._hidden = !!hidden;
        renderListEditors(type);
        renderPreview();
        showUnsaved();
    }

    function toggleItemFieldHidden(type, index, key, hidden) {
        if (!Array.isArray(resumeData[type]) || !resumeData[type][index]) return;
        ensureListItemMeta(type);
        const item = resumeData[type][index];
        if (!item._hiddenFields || typeof item._hiddenFields !== 'object' || Array.isArray(item._hiddenFields)) item._hiddenFields = {};
        item._hiddenFields[key] = !!hidden;
        renderListEditors(type);
        renderPreview();
        showUnsaved();
    }

    function fillForm() {
        renderSectionNav();
        renderSectionEditor(activeSection);
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function escapeAttr(value) {
        return escapeHtml(value);
    }

    function getSectionMeta(section) {
        return sectionMeta.find(item => item.key === section) || sectionMeta[0];
    }

    function setWorkspaceView(view, updateButtons = true) {
        activeWorkspaceView = view === 'preview' ? 'preview' : 'editor';
        const workspace = document.getElementById('resume-workspace');
        if (workspace) workspace.dataset.activeView = activeWorkspaceView;

        if (updateButtons) {
            const editorBtn = document.getElementById('workspace-editor-btn');
            const previewBtn = document.getElementById('workspace-preview-btn');
            if (editorBtn && previewBtn) {
                editorBtn.className = activeWorkspaceView === 'editor' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
                previewBtn.className = activeWorkspaceView === 'preview' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
            }
        }
    }

    function setActiveSection(section) {
        activeSection = sectionMeta.some(item => item.key === section) ? section : 'basic';
        renderSectionNav();
        renderSectionEditor(activeSection);
        setWorkspaceView('editor');
    }

    function renderSectionNav() {
        const nav = document.getElementById('section-nav');
        if (!nav) return;

        nav.innerHTML = sectionMeta.map(section => {
            const hidden = !!resumeData.hiddenSections[section.key];
            const active = activeSection === section.key;

            return `
                <div class="section-nav-row ${active ? 'is-active' : ''} ${hidden ? 'is-hidden' : ''}">
                    <button type="button" class="section-nav-main" onclick="setActiveSection('${section.key}')">
                        <span class="section-nav-icon">${section.icon}</span>
                        <span class="min-w-0">
                            <span class="section-nav-title">${section.title}</span>
                            ${hidden ? '<span class="section-hidden-badge">已隐藏</span>' : ''}
                        </span>
                    </button>
                    <label class="section-hide-toggle label cursor-pointer gap-1 p-0 font-normal" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()">
                        <span class="label-text text-xs">隐藏</span>
                        <input type="checkbox" class="checkbox checkbox-xs" id="hide-${section.key}" ${hidden ? 'checked' : ''} onchange="updateHiddenSection('${section.key}', this.checked)">
                    </label>
                </div>
            `;
        }).join('');
    }

    function renderSectionEditor(section) {
        const editor = document.getElementById('section-editor');
        if (!editor) return;

        const meta = getSectionMeta(section);
        editor.innerHTML = `
            <div class="section-editor-header">
                <div>
                    <div class="section-editor-kicker">当前模块</div>
                    <div class="section-editor-title">${meta.icon} ${meta.title}</div>
                </div>
            </div>
            ${renderSectionEditorBody(section)}
        `;

        if (['education', 'experience', 'projects', 'campus_experience', 'awards'].includes(section)) {
            ensureListItemMeta(section);
            renderListEditors(section);
        }

        if (section === 'skills') {
            renderSkillsHideList();
        }
    }

    function renderSectionEditorBody(section) {
        const b = resumeData.basic || {};
        const hiddenBasic = (resumeData.hiddenFields && resumeData.hiddenFields.basic) ? resumeData.hiddenFields.basic : {};
        const basicHiddenAttr = (key) => hiddenBasic[key] ? 'checked' : '';

        if (section === 'basic') {
            return `
                <div class="section-form-grid">
                    <div class="form-control">
                        <label class="label justify-between">
                            <span class="label-text">姓名</span>
                            <span class="inline-flex items-center gap-2" onclick="event.stopPropagation()">
                                <span class="text-xs opacity-60">隐藏</span>
                                <input type="checkbox" class="checkbox checkbox-xs" ${basicHiddenAttr('name')} onchange="updateHiddenField('basic', 'name', this.checked)">
                            </span>
                        </label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.name)}" oninput="updateField('basic', 'name', this.value)" id="input-name">
                    </div>
                    <div class="form-control">
                        <label class="label justify-between">
                            <span class="label-text">求职意向</span>
                            <span class="inline-flex items-center gap-2" onclick="event.stopPropagation()">
                                <span class="text-xs opacity-60">隐藏</span>
                                <input type="checkbox" class="checkbox checkbox-xs" ${basicHiddenAttr('job_target')} onchange="updateHiddenField('basic', 'job_target', this.checked)">
                            </span>
                        </label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.job_target)}" oninput="updateField('basic', 'job_target', this.value)" id="input-job_target">
                    </div>
                    <div class="form-control">
                        <label class="label justify-between">
                            <span class="label-text">电话</span>
                            <span class="inline-flex items-center gap-2" onclick="event.stopPropagation()">
                                <span class="text-xs opacity-60">隐藏</span>
                                <input type="checkbox" class="checkbox checkbox-xs" ${basicHiddenAttr('phone')} onchange="updateHiddenField('basic', 'phone', this.checked)">
                            </span>
                        </label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.phone)}" oninput="updateField('basic', 'phone', this.value)" id="input-phone">
                    </div>
                    <div class="form-control">
                        <label class="label justify-between">
                            <span class="label-text">邮箱</span>
                            <span class="inline-flex items-center gap-2" onclick="event.stopPropagation()">
                                <span class="text-xs opacity-60">隐藏</span>
                                <input type="checkbox" class="checkbox checkbox-xs" ${basicHiddenAttr('email')} onchange="updateHiddenField('basic', 'email', this.checked)">
                            </span>
                        </label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.email)}" oninput="updateField('basic', 'email', this.value)" id="input-email">
                    </div>
                    <div class="form-control span-full">
                        <label class="label justify-between">
                            <span class="label-text">所在城市</span>
                            <span class="inline-flex items-center gap-2" onclick="event.stopPropagation()">
                                <span class="text-xs opacity-60">隐藏</span>
                                <input type="checkbox" class="checkbox checkbox-xs" ${basicHiddenAttr('location')} onchange="updateHiddenField('basic', 'location', this.checked)">
                            </span>
                        </label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.location)}" oninput="updateField('basic', 'location', this.value)" id="input-location">
                    </div>
                    <div class="form-control span-full">
                        <label class="label justify-between">
                            <span class="label-text">自我评价</span>
                            <span class="flex items-center gap-2" onclick="event.stopPropagation()">
                                <span class="inline-flex items-center gap-2">
                                    <span class="text-xs opacity-60">隐藏</span>
                                    <input type="checkbox" class="checkbox checkbox-xs" ${basicHiddenAttr('self_evaluation')} onchange="updateHiddenField('basic', 'self_evaluation', this.checked)">
                                </span>
                                <button class="btn btn-ghost btn-xs text-accent gap-1" id="btn-opt-basic-0-self_evaluation" onclick="optimizeField('basic', 0, 'self_evaluation')">
                                    ✨ 润色
                                </button>
                            </span>
                        </label>
                        <textarea class="textarea textarea-bordered h-28" oninput="updateField('basic', 'self_evaluation', this.value)" id="input-self_evaluation">${escapeHtml(b.self_evaluation)}</textarea>
                    </div>
                </div>
            `;
        }

        if (section === 'skills') {
            return `
                <div class="form-control">
                    <label class="label"><span class="label-text">专业技能 (每行一个)</span></label>
                    <textarea class="textarea textarea-bordered h-40" oninput="updateArrayField('skills', this.value)" id="input-skills" placeholder="Java&#10;Python&#10;SQL">${escapeHtml((resumeData.skills || []).join('\n'))}</textarea>
                    <div id="skills-hide-list" class="mt-3 grid gap-2"></div>
                </div>
            `;
        }

        const listIds = {
            education: 'edu-list',
            experience: 'exp-list',
            projects: 'proj-list',
            campus_experience: 'campus-list',
            awards: 'award-list'
        };
        const addLabels = {
            education: '+ 添加学历',
            experience: '+ 添加经历',
            projects: '+ 添加项目',
            campus_experience: '+ 添加校园经历',
            awards: '+ 添加获奖记录'
        };

        return `
            <div id="${listIds[section]}" class="list-editor-stack"></div>
            <button onclick="addItem('${section}')" class="btn btn-sm btn-ghost w-full mt-3">${addLabels[section]}</button>
        `;
    }

    function updateField(section, key, value) {
        if (section === 'basic') {
            resumeData.basic[key] = value;
        }
        renderPreview();
        showUnsaved();
    }

    function updateArrayField(key, value) {
        resumeData[key] = value.split('\n').filter(i => i.trim());

        if (key === 'skills') {
            if (!resumeData.hiddenSkills || typeof resumeData.hiddenSkills !== 'object' || Array.isArray(resumeData.hiddenSkills)) {
                resumeData.hiddenSkills = {};
            }
            const set = new Set((resumeData.skills || []).map(s => String(s)));
            Object.keys(resumeData.hiddenSkills).forEach(k => {
                if (!set.has(String(k))) delete resumeData.hiddenSkills[k];
            });
            renderSkillsHideList();
        }

        renderPreview();
        showUnsaved();
    }

    function updateHiddenSection(section, hidden) {
        resumeData.hiddenSections[section] = hidden;
        renderSectionNav();
        renderPreview();
        showUnsaved();
    }

    function getLayoutDensity() {
        const density = Number(resumeData.layout?.density || 0);
        if (!Number.isFinite(density)) return 0;
        return Math.min(Math.max(Math.round(density), 0), layoutPresets.length - 1);
    }

    function applyLayoutDensity(density, shouldStore = true) {
        const container = document.getElementById('resume-preview');
        if (!container) return;

        const safeDensity = Math.min(Math.max(Math.round(density), 0), layoutPresets.length - 1);
        const preset = layoutPresets[safeDensity];
        const cssVars = {
            fontScale: '--resume-font-scale',
            lineHeight: '--resume-line-height',
            sectionTop: '--resume-section-margin-top',
            sectionBottom: '--resume-section-margin-bottom',
            sectionPadding: '--resume-section-padding-bottom',
            itemMargin: '--resume-item-margin',
            itemHeaderMargin: '--resume-item-header-margin',
            descMargin: '--resume-desc-margin',
            modernPaddingY: '--resume-modern-padding-y',
            modernMainPaddingX: '--resume-modern-main-padding-x',
            modernSidebarPaddingX: '--resume-modern-sidebar-padding-x',
            classicPadding: '--resume-classic-padding',
            classicHeaderPadding: '--resume-classic-header-padding',
            classicHeaderMargin: '--resume-classic-header-margin',
            contactMargin: '--resume-contact-margin',
            skillPaddingY: '--resume-skill-padding-y',
            skillPaddingX: '--resume-skill-padding-x',
            skillMarginBottom: '--resume-skill-margin-bottom'
        };

        Object.entries(cssVars).forEach(([key, cssVar]) => {
            const value = preset[key];
            const cssValue = key === 'fontScale' || key === 'lineHeight' ? value : `${value}px`;
            container.style.setProperty(cssVar, cssValue);
        });

        if (shouldStore) {
            resumeData.layout.density = safeDensity;
        }
    }

    // 列表编辑器渲染器
    function renderListEditors(type) {
        const listContainers = {
            education: 'edu-list',
            experience: 'exp-list',
            projects: 'proj-list',
            campus_experience: 'campus-list',
            awards: 'award-list'
        };
        const container = document.getElementById(listContainers[type]);
        if (!container) return;
        container.innerHTML = '';

        ensureListItemMeta(type);
        
        const fieldHiddenAttr = (item, key) => (item && item._hiddenFields && item._hiddenFields[key]) ? 'checked' : '';

        resumeData[type].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `card bg-base-200 p-3 relative group ${item._hidden ? 'opacity-60' : ''}`;
            
            let fields = '';
            if (type === 'education') {
                fields = `
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs opacity-60">第 ${index + 1} 条</span>
                        <label class="label cursor-pointer gap-2 p-0" onclick="event.stopPropagation()">
                            <span class="label-text text-xs">隐藏本条</span>
                            <input type="checkbox" class="checkbox checkbox-xs" ${item._hidden ? 'checked' : ''} onchange="toggleItemHidden('${type}', ${index}, this.checked)">
                        </label>
                    </div>
                    <div class="flex items-center gap-2 mb-2">
                        <input class="input input-sm flex-1" placeholder="学校名称" value="${escapeAttr(item.school)}" oninput="updateListItem('${type}', ${index}, 'school', this.value)">
                        <label class="label cursor-pointer gap-2 p-0" onclick="event.stopPropagation()">
                            <span class="label-text text-xs">隐藏</span>
                            <input type="checkbox" class="checkbox checkbox-xs" ${fieldHiddenAttr(item, 'school')} onchange="toggleItemFieldHidden('${type}', ${index}, 'school', this.checked)">
                        </label>
                    </div>

    function updateListItem(type, index, key, value) {
        resumeData[type][index][key] = value;
        renderPreview();
        showUnsaved();
    }

    function addItem(type) {
        resumeData[type].push({ _hidden: false, _id: generateLocalId(), _hiddenFields: {} });
        renderSectionEditor(activeSection);
        renderSectionNav();
        renderPreview();
        showUnsaved();
    }

    function deleteItem(type, index) {
        resumeData[type].splice(index, 1);
        renderSectionEditor(activeSection);
        renderSectionNav();
        renderPreview();
        showUnsaved();
    }

    function renderPreviewContact(b) {
        const contacts = [
            (b.phone && !isFieldHidden('basic', 'phone')) ? `电话：${b.phone}` : '',
            (b.email && !isFieldHidden('basic', 'email')) ? `邮箱：${b.email}` : '',
            (b.location && !isFieldHidden('basic', 'location')) ? `城市：${b.location}` : ''
        ].filter(Boolean);

        if (contacts.length === 0) return '';
        const content = contacts.map(item => `<span>${escapeHtml(item)}</span>`).join('');
        return `<div class="tpl-contact">${content}</div>`;
    }

    function renderPreviewSection(title, content) {
        if (!String(content || '').trim()) return '';
        return `
            <section class="tpl-section">
                <div class="tpl-section-title">${title}</div>
                ${content}
            </section>
        `;
    }

    function renderPreviewItem({ title, subtitle = '', date = '', desc = '' }) {
        return `
            <div class="tpl-item">
                <div class="tpl-item-header">
                    <span class="tpl-item-title">${escapeHtml(title)}</span>
                    ${date ? `<span class="tpl-item-date">${escapeHtml(date)}</span>` : ''}
                </div>
                ${subtitle ? `<div class="tpl-item-subtitle">${escapeHtml(subtitle)}</div>` : ''}
                ${desc ? `<div class="tpl-item-desc">${escapeHtml(desc)}</div>` : ''}
            </div>
        `;
    }

    function itemFieldVisible(item, key) {
        if (!item || typeof item !== 'object') return true;
        if (item._hidden) return false;
        if (!item._hiddenFields || typeof item._hiddenFields !== 'object' || Array.isArray(item._hiddenFields)) return true;
        return !item._hiddenFields[key];
    }

    function renderPreviewAwards(items) {
        return items.map(item => {
            const title = itemFieldVisible(item, 'name') ? (item.name || '') : '';
            const rank = itemFieldVisible(item, 'rank') ? (item.rank || '') : '';
            const level = itemFieldVisible(item, 'level') ? (item.level || '') : '';
            if (!String(title || rank || level).trim()) return '';
            return `
                <div class="tpl-item">
                    ${title ? `<div class="tpl-award-title">${escapeHtml(title)}</div>` : ''}
                    ${(rank || level) ? `
                        <div class="tpl-award-meta">
                            ${rank ? `<span class="tpl-chip">${escapeHtml(rank)}</span>` : ''}
                            ${level ? `<span class="tpl-chip">${escapeHtml(level)}</span>` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
    }

    function renderPreviewSkills(items) {
        return `<div class="tpl-chip-row">${items.map(skill => `<span class="tpl-chip">${escapeHtml(skill)}</span>`).join('')}</div>`;
    }

    function renderPreviewContentBlock(p, key) {
        const renderers = {
            summary: () => p.showBasic && !isFieldHidden('basic', 'self_evaluation') && p.b.self_evaluation ? `<div class="tpl-item-desc">${escapeHtml(p.b.self_evaluation)}</div>` : '',
            education: () => p.educationItems.map(item => {
                const title = itemFieldVisible(item, 'school') ? (item.school || '') : '';
                const subtitle = itemFieldVisible(item, 'major') ? (item.major || '') : '';
                const date = itemFieldVisible(item, 'date') ? (item.date || '') : '';
                if (!String(title || subtitle || date).trim()) return '';
                return renderPreviewItem({ title, subtitle, date });
            }).join(''),
            experience: () => p.experienceItems.map(item => {
                const title = itemFieldVisible(item, 'company') ? (item.company || '') : '';
                const subtitle = itemFieldVisible(item, 'position') ? (item.position || '') : '';
                const date = itemFieldVisible(item, 'date') ? (item.date || '') : '';
                const desc = itemFieldVisible(item, 'description') ? (item.description || '') : '';
                if (!String(title || subtitle || date || desc).trim()) return '';
                return renderPreviewItem({ title, subtitle, date, desc });
            }).join(''),
            projects: () => p.projectItems.map(item => {
                const title = itemFieldVisible(item, 'name') ? (item.name || '') : '';
                const subtitle = itemFieldVisible(item, 'role') ? (item.role || '') : '';
                const date = itemFieldVisible(item, 'date') ? (item.date || '') : '';
                const desc = itemFieldVisible(item, 'description') ? (item.description || '') : '';
                if (!String(title || subtitle || date || desc).trim()) return '';
                return renderPreviewItem({ title, subtitle, date, desc });
            }).join(''),
            campus: () => p.campusItems.map(item => {
                const title = itemFieldVisible(item, 'organization') ? (item.organization || '') : '';
                const subtitle = itemFieldVisible(item, 'position') ? (item.position || '') : '';
                const desc = itemFieldVisible(item, 'achievements') ? (item.achievements || '') : '';
                if (!String(title || subtitle || desc).trim()) return '';
                return renderPreviewItem({ title, subtitle, desc });
            }).join(''),
            awards: () => renderPreviewAwards(p.awardItems),
            skills: () => p.skillItems.length > 0 ? renderPreviewSkills(p.skillItems) : ''
        };
        return renderers[key] ? renderers[key]() : '';
    }

    function renderPreviewSections(p, sections) {
        const labels = {
            summary: '自我评价',
            education: '教育背景',
            experience: '实习/工作经历',
            projects: '项目经验',
            campus: '校园内经历',
            awards: '获奖',
            skills: '技能与证书'
        };

        return sections.map(key => renderPreviewSection(labels[key], renderPreviewContentBlock(p, key))).join('');
    }

    // --- 预览渲染逻辑 ---

    function renderPreview() {
        const container = document.getElementById('resume-preview');
        const d = resumeData;
        const b = d.basic || {};
        const hidden = d.hiddenSections || {};
        const sectionVisible = (section) => !hidden[section];
        const hasText = (value) => String(value || '').trim().length > 0;
        const filterItems = (items, keys) => (items || []).filter(item => item && !item._hidden && keys.some(key => hasText(item[key])));
        const educationItems = filterItems(d.education, ['school', 'major', 'date']);
        const experienceItems = filterItems(d.experience, ['company', 'position', 'date', 'description']);
        const projectItems = filterItems(d.projects, ['name', 'role', 'date', 'description']);
        const campusItems = filterItems(d.campus_experience, ['organization', 'position', 'achievements']);
        const awardItems = filterItems(d.awards, ['name', 'rank', 'level']);
        const skillItems = (d.skills || []).filter(hasText).filter(s => !isSkillHidden(s));
        const showBasic = sectionVisible('basic');
        const showSkills = sectionVisible('skills') && skillItems.length > 0;

        const basicVisible = {
            name: showBasic && !isFieldHidden('basic', 'name'),
            job_target: showBasic && !isFieldHidden('basic', 'job_target'),
            phone: showBasic && !isFieldHidden('basic', 'phone'),

                        ${sectionVisible('awards') ? awardItems.map(item => {
                            const title = itemFieldVisible(item, 'name') ? (item.name || '') : '';
                            const rank = itemFieldVisible(item, 'rank') ? (item.rank || '') : '';
                            const level = itemFieldVisible(item, 'level') ? (item.level || '') : '';
                            if (!hasText(title) && !hasText(rank) && !hasText(level)) return '';
                            return `
                                <div class="award-item">
                                    ${hasText(title) ? `<div class=\"award-title\">${escapeHtml(title)}</div>` : ''}
                                    ${(hasText(rank) || hasText(level)) ? `
                                        <div class="award-meta">
                                            ${hasText(rank) ? `<span class=\"award-badge\">${escapeHtml(rank)}</span>` : ''}
                                            ${hasText(level) ? `<span class=\"award-badge\">${escapeHtml(level)}</span>` : ''}
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('') : ''}

                        ${sectionVisible('education') && educationItems.length > 0 ? `<div class="section-title">教育背景</div>` : ''}
                        ${sectionVisible('education') ? educationItems.map(item => {
                            const title = itemFieldVisible(item, 'school') ? (item.school || '') : '';
                            const date = itemFieldVisible(item, 'date') ? (item.date || '') : '';
                            const subtitle = itemFieldVisible(item, 'major') ? (item.major || '') : '';
                            if (!hasText(title) && !hasText(date) && !hasText(subtitle)) return '';
                            const header = (hasText(title) || hasText(date)) ? `
                                <div class="item-header">
                                    <span class="item-title">${escapeHtml(title)}</span>
                                    ${hasText(date) ? `<span class=\"item-date\">${escapeHtml(date)}</span>` : ''}
                                </div>
                            ` : '';
                            return `
                                <div class="item">
                                    ${header}
                                    ${hasText(subtitle) ? `<div class=\"item-subtitle\">${escapeHtml(subtitle)}</div>` : ''}
                                </div>
                            `;
                        }).join('') : ''}
                    </div>
                </div>
            `;
        } else if (currentTemplate === 'ats') {
            container.innerHTML = `
                <div class="resume-ats">
                    ${p.showBasic && hasAnyBasicHeader ? `
                        <header class="ats-header">
                            ${basicVisible.name ? `<div class="ats-name">${escapeHtml(b.name || '姓名')}</div>` : ''}
                            ${basicVisible.job_target ? `<div class="ats-target">${escapeHtml(b.job_target || '求职意向')}</div>` : ''}
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    ${renderPreviewSections(p, ['summary', 'education', 'experience', 'projects', 'campus', 'awards', 'skills'])}
                </div>
            `;
        } else if (currentTemplate === 'minimal') {
            container.innerHTML = `
                <div class="resume-minimal">
                    ${p.showBasic && hasAnyBasicHeader ? `
                        <header class="minimal-header">
                            ${basicVisible.name ? `<div class="minimal-name">${escapeHtml(b.name || '姓名')}</div>` : ''}
                            ${basicVisible.job_target ? `<div class="minimal-target">${escapeHtml(b.job_target || '')}</div>` : ''}
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    ${renderPreviewSections(p, ['summary', 'experience', 'projects', 'campus', 'awards', 'education', 'skills'])}
                </div>
            `;
        } else if (currentTemplate === 'campus') {
            container.innerHTML = `
                <div class="resume-campus">
                    ${p.showBasic && hasAnyBasicHeader ? `
                        <header class="campus-header">
                            <div>
                                ${basicVisible.name ? `<div class="campus-name">${escapeHtml(b.name || '姓名')}</div>` : ''}
                                ${basicVisible.job_target ? `<div class="campus-target">${escapeHtml(b.job_target || '求职意向')}</div>` : ''}
                            </div>
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    ${renderPreviewSections(p, ['summary', 'education', 'campus', 'awards', 'projects', 'experience', 'skills'])}
                </div>
            `;
        } else if (currentTemplate === 'business') {
            container.innerHTML = `
                <div class="resume-business">
                    <aside class="business-side">
                        ${p.showBasic && hasAnyBasicHeader ? `
                            ${basicVisible.name ? `<div class="business-name">${escapeHtml(b.name || '姓名')}</div>` : ''}
                            ${basicVisible.job_target ? `<div class="business-target">${escapeHtml(b.job_target || '')}</div>` : ''}
                            ${renderPreviewSection('联系方式', renderPreviewContact(b))}
                        ` : ''}
                        ${renderPreviewSections(p, ['skills', 'awards'])}
                    </aside>
                    <main class="business-main">
                        ${renderPreviewSections(p, ['summary', 'experience', 'projects', 'campus', 'education'])}
                    </main>
                </div>
            `;
        } else if (currentTemplate === 'creative') {
            container.innerHTML = `
                <div class="resume-creative">
                    ${p.showBasic && hasAnyBasicHeader ? `
                        <header class="creative-header">
                            ${basicVisible.name ? `<div class="creative-name">${escapeHtml(b.name || '姓名')}</div>` : ''}
                            ${basicVisible.job_target ? `<div class="creative-target">${escapeHtml(b.job_target || '求职意向')}</div>` : ''}
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    <div class="creative-body">
                        ${renderPreviewSections(p, ['summary', 'projects', 'experience', 'campus', 'awards', 'education', 'skills'])}
                    </div>
                </div>
            `;
        } else if (currentTemplate === 'tech') {
            container.innerHTML = `
                <div class="resume-tech">
                    <aside class="tech-side">
                        ${p.showBasic && hasAnyBasicHeader ? `
                            ${basicVisible.name ? `<div class="tech-name">${escapeHtml(b.name || '姓名')}</div>` : ''}
                            ${basicVisible.job_target ? `<div class="tech-target">${escapeHtml(b.job_target || '')}</div>` : ''}
                            ${renderPreviewSection('联系方式', renderPreviewContact(b))}
                        ` : ''}
                        ${renderPreviewSections(p, ['skills', 'awards'])}
                    </aside>
                    <main class="tech-main">
                        ${renderPreviewSections(p, ['summary', 'projects', 'experience', 'campus', 'education'])}
                    </main>
                </div>
            `;
        } else {
            // Classic Template
            const classicContacts = [
                (b.phone && !isFieldHidden('basic', 'phone')) ? b.phone : '',
                (b.email && !isFieldHidden('basic', 'email')) ? b.email : '',
                (b.location && !isFieldHidden('basic', 'location')) ? b.location : ''
            ].filter(v => hasText(v)).join(' | ');
            container.innerHTML = `
                <div class="resume-classic">
                    ${showBasic ? `
                        ${hasAnyBasicHeader ? `
                            <div class="header">
                                ${basicVisible.name ? `<div class="name">${escapeHtml(b.name || '姓名')}</div>` : ''}
                                ${classicContacts ? `<div class="contact">${escapeHtml(classicContacts)}</div>` : ''}
                                ${basicVisible.job_target ? `<div class="contact">求职意向：${escapeHtml(b.job_target || '')}</div>` : ''}
                            </div>
                        ` : ''}

                        ${basicVisible.self_evaluation ? `
                            <div class="section-title">自我评价</div>
                            <p class="item-desc">${escapeHtml(b.self_evaluation || '')}</p>
                        ` : ''}
                    ` : ''}

                    ${sectionVisible('education') && educationItems.length > 0 ? `<div class="section-title">教育背景</div>` : ''}
                    ${sectionVisible('education') ? educationItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${item.school || ''} - ${item.major || ''}</span>
                                <span>${item.date || ''}</span>
                            </div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('experience') && experienceItems.length > 0 ? `<div class="section-title">工作经历</div>` : ''}
                    ${sectionVisible('experience') ? experienceItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${item.company || ''} - ${item.position || ''}</span>
                                <span>${item.date || ''}</span>
                            </div>
                            <div class="item-desc">${item.description || ''}</div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('projects') && projectItems.length > 0 ? `<div class="section-title">项目经验</div>` : ''}
                    ${sectionVisible('projects') ? projectItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${item.name || ''} - ${item.role || ''}</span>
                                <span>${item.date || ''}</span>
                            </div>
                            <div class="item-desc">${item.description || ''}</div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('campus_experience') && campusItems.length > 0 ? `<div class="section-title">校园内经历</div>` : ''}
                    ${sectionVisible('campus_experience') ? campusItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${item.organization || ''} - ${item.position || ''}</span>
                            </div>
                            <div class="item-desc">${item.achievements || ''}</div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('awards') && awardItems.length > 0 ? `<div class="section-title">获奖</div>` : ''}
                    ${sectionVisible('awards') ? awardItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${item.name || ''} - ${item.rank || ''}</span>
                                <span>${item.level || ''}</span>
                            </div>
                        </div>
                    `).join('') : ''}

                    ${showSkills ? `
                        <div class="section-title">技能</div>
                        <p class="item-desc">${skillItems.join(' / ')}</p>
                    ` : ''}
                </div>
            `;
        }

        applyLayoutDensity(getLayoutDensity(), false);
    }

    // --- 功能函数 ---

    function changeTemplate(tpl) {
        currentTemplate = tpl;
        renderPreview();
        showUnsaved();
    }

    function nextPaint() {
        return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    function getA4HeightPx() {
        const probe = document.createElement('div');
        probe.style.position = 'absolute';
        probe.style.visibility = 'hidden';
        probe.style.pointerEvents = 'none';
        probe.style.height = '297mm';
        probe.style.width = '1px';
        document.body.appendChild(probe);
        const height = probe.getBoundingClientRect().height;
        probe.remove();
        return height;
    }

    function previewFitsOnePage() {
        const container = document.getElementById('resume-preview');
        if (!container) return true;
        return container.scrollHeight <= getA4HeightPx() + 4;
    }

    async function fitOnePage() {
        const btn = document.getElementById('btn-fit-one-page');
        const originalText = btn.innerText;
        btn.innerText = '调整中...';
        btn.disabled = true;

        try {
            renderPreview();
            let fittedDensity = layoutPresets.length - 1;

            for (let density = 0; density < layoutPresets.length; density++) {
                applyLayoutDensity(density);
                await nextPaint();

                if (previewFitsOnePage()) {
                    fittedDensity = density;
                    break;
                }
            }

            applyLayoutDensity(fittedDensity);
            await nextPaint();
            showUnsaved();

            const status = document.getElementById('save-status');
            if (status) {
                status.innerText = fittedDensity === 0 ? '未保存（一页纸：无需压缩）' : `未保存（一页纸：紧凑 ${fittedDensity}）`;
            }

            if (!previewFitsOnePage()) {
                alert('已调整到最紧凑排版，但当前内容可能仍超过一页。可以尝试隐藏部分模块或精简内容。');
            }
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    async function saveResume() {
        const btn = document.querySelector('button[onclick="saveResume()"]');
        const originalText = btn.innerText;
        btn.innerText = '保存中...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/resume/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: resumeId,
                    content: resumeData,
                    template_id: currentTemplate,
                    title: resumeData.basic.name + '的简历'
                })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('save-status').innerText = '已保存 ' + new Date().toLocaleTimeString();
                document.getElementById('save-status').classList.remove('text-error');
            } else {
                alert('保存失败: ' + data.error);
            }
        } catch (e) {
            alert('网络错误');
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function showUnsaved() {
        document.getElementById('save-status').innerText = '未保存';
        document.getElementById('save-status').classList.add('text-error');
    }

    // --- AI 优化相关 ---
    
    let currentOptimizingField = null; // { type, index, key }

    async function optimizeField(type, index, key) {
        // 获取当前内容
        let content = '';
        let fieldLabel = '';
        
        if (type === 'basic') {
            content = resumeData.basic[key];
            fieldLabel = '自我评价';
        } else if (type === 'experience' || type === 'projects') {
            content = resumeData[type][index][key];
            fieldLabel = type === 'experience' ? '工作经历描述' : '项目描述';
        }
        
        if (!content || content.length < 5) {
            alert('内容太短，无法优化');
            return;
        }

        // 显示 Loading 状态 (在按钮上)
        const btnId = `btn-opt-${type}-${index}-${key}`;
        const btn = document.getElementById(btnId);
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span>';
        btn.disabled = true;

        try {
            const res = await fetch('/api/resume/optimize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    content: content,
                    type: fieldLabel
                })
            });
            const data = await res.json();
            
            if (data.success) {
                showSuggestionPopup(type, index, key, data.suggestion);
            } else {
                alert('AI 优化失败: ' + (data.error || '未知错误'));
            }
        } catch (e) {
            console.error(e);
            alert('请求出错');
        } finally {
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }
    }

function showSuggestionPopup(type, index, key, suggestion) {
        // 1. 移除旧的弹窗
        const oldPopup = document.getElementById('ai-suggestion-popup');
        if (oldPopup) oldPopup.remove();

        // 2. 找到目标输入框
        let targetInputId = '';
        if (type === 'basic') {
            targetInputId = `input-${key}`;
        } else {
            targetInputId = `input-${type}-${index}-${key}`;
        }
        
        const targetInput = document.getElementById(targetInputId);
        if (!targetInput) return;

        // 3. 【核心修改】计算目标输入框在页面中的绝对位置
        const rect = targetInput.getBoundingClientRect();
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;

        // 4. 创建浮窗
        const popup = document.createElement('div');
        popup.id = 'ai-suggestion-popup';
        
        // 样式修改：
        // - position: absolute (配合 body 使用)
        // - z-index: 9999 (确保最高层级)
        // - 保持橙色主题
        popup.className = 'bg-orange-50 shadow-2xl border-2 border-orange-400 rounded-xl p-4 animate-in fade-in slide-in-from-top-2';
        
        // 【核心修改】直接设置内联样式来定位
        popup.style.position = 'absolute';
        popup.style.zIndex = '9999';
        popup.style.width = rect.width + 'px'; // 宽度与输入框一致
        popup.style.top = (rect.bottom + scrollTop + 6) + 'px'; // 位于输入框下方 + 6px 间距
        popup.style.left = (rect.left + scrollLeft) + 'px'; // 左对齐

        popup.innerHTML = `
            <div class="flex justify-between items-center mb-2">
                <div class="text-xs font-bold text-orange-600 flex items-center gap-1">
                    ✨ AI 优化建议
                </div>
                <div class="flex gap-1">
                    <button onclick="applySuggestion('${type}', '${index}', '${key}')" class="btn btn-xs bg-orange-500 hover:bg-orange-600 text-white border-none" title="应用">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                        应用
                    </button>
                    <button onclick="closeSuggestion()" class="btn btn-xs btn-ghost text-base-content/50" title="忽略">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
            </div>
            <div class="text-sm text-gray-700 p-1 rounded-lg max-h-40 overflow-y-auto whitespace-pre-wrap" id="suggestion-text">${suggestion}</div>
        `;

        // 5. 【核心修改】将弹窗追加到 body，而不是 input 的父级
        document.body.appendChild(popup);
        
        // 监听一次点击外部关闭（可选优化体验）
        setTimeout(() => {
            const closeOnClickOutside = (e) => {
                if (!popup.contains(e.target) && e.target !== targetInput) {
                    closeSuggestion();
                    document.removeEventListener('click', closeOnClickOutside);
                }
            };
            document.addEventListener('click', closeOnClickOutside);
        }, 100);
    }
    function applySuggestion(type, index, key) {
        const text = document.getElementById('suggestion-text').innerText;
        
        if (type === 'basic') {
            updateField('basic', key, text);
            document.getElementById(`input-${key}`).value = text;
        } else {
            updateListItem(type, index, key, text);
            const el = document.getElementById(`input-${type}-${index}-${key}`);
            if (el) el.value = text;
        }
        closeSuggestion();
    }

    function closeSuggestion() {
        const popup = document.getElementById('ai-suggestion-popup');
        if (popup) popup.remove();
    }

    // --- 导出功能 ---

function exportPDF() {
    // 1. 更改网页标题（因为浏览器打印默认用网页标题作为文件名）
    const originalTitle = document.title;
    const name = resumeData.basic.name || '简历';
    document.title = `${name}_简历`;

    // 2. 调用浏览器打印
    window.print();

    // 3. 恢复标题
    //由于 print 是阻塞的（或在某些浏览器是非阻塞的），建议用 timeout 恢复
    setTimeout(() => {
        document.title = originalTitle;
    }, 1000);
}
</script>
