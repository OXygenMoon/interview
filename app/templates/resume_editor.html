{% extends "base.html" %}

{% block title %}智能简历构建器{% endblock %}

{% block content %}
<!-- 引入 html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<div class="resume-view-switch">
    <button type="button" id="workspace-editor-btn" class="btn btn-sm btn-primary" onclick="setWorkspaceView('editor')">编辑</button>
    <button type="button" id="workspace-preview-btn" class="btn btn-sm btn-ghost" onclick="setWorkspaceView('preview')">预览</button>
</div>

<div class="resume-workspace" id="resume-workspace" data-active-view="editor">

    <!-- 左侧：编辑区 -->
    <div class="resume-editor-pane bg-base-100 rounded-xl shadow-sm border border-base-200 overflow-hidden" id="editor-pane">

        <!-- 工具栏 -->
        <div class="resume-editor-toolbar p-4 border-b border-base-200 flex justify-between items-center bg-base-200/50">
            <div class="flex items-center gap-2">
                <span class="font-bold text-lg">📝 编辑简历</span>
                <span id="save-status" class="text-xs text-base-content/50 ml-2">已保存</span>
            </div>
            <div class="flex gap-2">
                <button onclick="saveResume()" class="btn btn-sm btn-primary text-white">
                    保存
                </button>
            </div>
        </div>

        <div class="resume-editor-body">
            <aside class="resume-section-nav" id="section-nav"></aside>
            <section class="resume-section-editor" id="section-editor"></section>
        </div>
    </div>

    <!-- 右侧：预览区 -->
    <div class="resume-preview-pane bg-base-200/50 rounded-xl border border-base-200" id="preview-pane">
        
        <!-- 预览工具栏 -->
        <div class="p-3 border-b border-base-200 flex justify-between items-center">
            <select class="select select-sm select-bordered" onchange="changeTemplate(this.value)">
                <option value="modern">现代简约 (Modern)</option>
                <option value="classic">经典商务 (Classic)</option>
            </select>
            <div class="flex gap-2">
                <button onclick="fitOnePage()" class="btn btn-sm btn-accent text-white gap-2" id="btn-fit-one-page">
                    智能一页纸
                </button>
                <button onclick="exportPDF()" class="btn btn-sm btn-secondary text-white gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    导出 PDF
                </button>
            </div>
        </div>

        <!-- 预览画布 -->
        <div class="flex-1 overflow-y-auto p-4 flex justify-center bg-gray-100">
            <div id="resume-preview" class="bg-white shadow-xl origin-top transition-transform" style="width: 210mm; min-height: 297mm; padding: 0;">
                <!-- 简历内容将由 JS 渲染 -->
            </div>
        </div>
    </div>
</div>

<!-- 样式 -->
<style>
    /* Print Styles - Global override for clean printing */
    @media print {
        body {
            visibility: hidden;
            background: white;
            margin: 0;
            padding: 0;
        }

        .resume-workspace {
            display: block !important;
            height: auto !important;
            min-height: 0 !important;
        }

        .resume-view-switch,
        .resume-editor-pane {
            display: none !important;
        }

        .resume-preview-pane {
            display: block !important;
            background: white !important;
            border: 0 !important;
        }
        
        #resume-preview {
            visibility: visible;
            position: absolute;
            left: 0;
            top: 0;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            box-shadow: none !important;
            border: none !important;
            transform: none !important; /* Reset any scaling */
            z-index: 9999;
            background: white;
        }

        #resume-preview * {
            visibility: visible;
        }

        /* Hide headers, footers, and page info */
        @page {
            margin: 0;
            size: auto;
        }
    }

    .resume-view-switch {
        display: none;
        gap: 8px;
        margin-bottom: 12px;
        padding: 6px;
        width: fit-content;
        background: hsl(var(--b1));
        border: 1px solid hsl(var(--b2));
        border-radius: 10px;
        box-shadow: 0 8px 24px rgb(15 23 42 / 0.08);
    }

    .resume-workspace {
        display: grid;
        grid-template-columns: minmax(520px, 1fr) minmax(520px, 1fr);
        gap: 24px;
        height: calc(100vh - 6rem);
        min-height: 620px;
    }

    .resume-editor-pane,
    .resume-preview-pane {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
    }

    .resume-editor-toolbar {
        flex: 0 0 auto;
    }

    .resume-editor-body {
        display: grid;
        grid-template-columns: 190px minmax(0, 1fr);
        gap: 14px;
        min-height: 0;
        flex: 1;
        padding: 14px;
        background: hsl(var(--b2) / 0.25);
    }

    .resume-section-nav {
        min-height: 0;
        overflow-y: auto;
        padding-right: 2px;
    }

    .resume-section-editor {
        min-width: 0;
        min-height: 0;
        overflow-y: auto;
        background: hsl(var(--b1));
        border: 1px solid hsl(var(--b2));
        border-radius: 12px;
        padding: 18px;
    }

    .section-nav-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        min-height: 48px;
        margin-bottom: 8px;
        padding: 6px;
        border: 1px solid hsl(var(--b2));
        border-radius: 10px;
        background: hsl(var(--b1));
        transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .section-nav-row.is-active {
        border-color: hsl(var(--p));
        background: hsl(var(--p) / 0.08);
        box-shadow: 0 8px 18px hsl(var(--p) / 0.12);
    }

    .section-nav-row.is-hidden {
        opacity: 0.62;
    }

    .section-nav-main {
        min-width: 0;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
    }

    .section-nav-icon {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: hsl(var(--b2));
        flex: 0 0 auto;
    }

    .section-nav-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .section-hidden-badge {
        display: block;
        margin-top: 2px;
        font-size: 11px;
        font-weight: 400;
        color: hsl(var(--bc) / 0.55);
    }

    .section-editor-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding-bottom: 14px;
        margin-bottom: 14px;
        border-bottom: 1px solid hsl(var(--b2));
    }

    .section-editor-kicker {
        font-size: 12px;
        color: hsl(var(--bc) / 0.55);
        margin-bottom: 2px;
    }

    .section-editor-title {
        font-size: 18px;
        font-weight: 800;
    }

    .section-form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
    }

    .section-form-grid .span-full {
        grid-column: 1 / -1;
    }

    .list-editor-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    #resume-preview {
        --resume-font-scale: 1;
        --resume-line-height: 1.6;
        --resume-section-margin-top: 20px;
        --resume-section-margin-bottom: 15px;
        --resume-section-padding-bottom: 5px;
        --resume-item-margin: 20px;
        --resume-item-header-margin: 4px;
        --resume-desc-margin: 5px;
        --resume-modern-padding-y: 30px;
        --resume-modern-main-padding-x: 30px;
        --resume-modern-sidebar-padding-x: 20px;
        --resume-classic-padding: 40px;
        --resume-classic-header-padding: 20px;
        --resume-classic-header-margin: 20px;
        --resume-contact-margin: 10px;
        --resume-skill-padding-y: 4px;
        --resume-skill-padding-x: 8px;
        --resume-skill-margin-bottom: 6px;
    }

    /* Modern Template Styles */
    .section-hide-toggle {
        position: relative;
        z-index: 20;
        pointer-events: auto;
    }
    .section-hide-toggle input {
        pointer-events: auto;
    }

    .resume-modern { font-family: 'Segoe UI', sans-serif; color: #333; line-height: var(--resume-line-height); display: flex; min-height: 297mm; font-size: calc(14px * var(--resume-font-scale)); }
    .resume-modern .sidebar { width: 30%; background: #f8f9fa; border-right: 1px solid #eee; padding: var(--resume-modern-padding-y) var(--resume-modern-sidebar-padding-x); }
    .resume-modern .main { width: 70%; padding: var(--resume-modern-padding-y) var(--resume-modern-main-padding-x); }
    .resume-modern .avatar { width: 100px; height: 100px; background: #ddd; border-radius: 50%; margin: 0 auto 20px; display: block; object-fit: cover; }
    .resume-modern .name { font-size: calc(24px * var(--resume-font-scale)); font-weight: bold; text-align: center; color: #2c3e50; }
    .resume-modern .target { text-align: center; color: #7f8c8d; margin-bottom: calc(30px * var(--resume-font-scale)); font-size: calc(14px * var(--resume-font-scale)); }
    .resume-modern .section-title { font-size: calc(16px * var(--resume-font-scale)); font-weight: bold; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: var(--resume-section-padding-bottom); margin: var(--resume-section-margin-top) 0 var(--resume-section-margin-bottom); }
    .resume-modern .contact-item { font-size: calc(13px * var(--resume-font-scale)); margin-bottom: calc(8px * var(--resume-font-scale)); display: flex; gap: 8px; align-items: center; color: #555; }
    .resume-modern .skill-item { background: #e8f4fd; color: #2980b9; padding: var(--resume-skill-padding-y) var(--resume-skill-padding-x); border-radius: 4px; font-size: calc(12px * var(--resume-font-scale)); margin-bottom: var(--resume-skill-margin-bottom); display: inline-block; margin-right: 4px; }
    
    .resume-modern .item { margin-bottom: var(--resume-item-margin); }
    .resume-modern .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: var(--resume-item-header-margin); }
    .resume-modern .item-title { font-weight: bold; font-size: calc(16px * var(--resume-font-scale)); color: #34495e; }
    .resume-modern .item-subtitle { font-weight: 600; font-size: calc(14px * var(--resume-font-scale)); color: #7f8c8d; }
    .resume-modern .item-date { font-size: calc(12px * var(--resume-font-scale)); color: #95a5a6; }
    .resume-modern .item-desc { font-size: calc(13px * var(--resume-font-scale)); color: #555; white-space: pre-line; margin-top: var(--resume-desc-margin); }

    /* Classic Template Styles */
    .resume-classic { font-family: 'Times New Roman', serif; color: #000; padding: var(--resume-classic-padding); line-height: var(--resume-line-height); font-size: calc(14px * var(--resume-font-scale)); }
    .resume-classic .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: var(--resume-classic-header-padding); margin-bottom: var(--resume-classic-header-margin); }
    .resume-classic .name { font-size: calc(28px * var(--resume-font-scale)); font-weight: bold; text-transform: uppercase; }
    .resume-classic .contact { font-size: calc(14px * var(--resume-font-scale)); margin-top: var(--resume-contact-margin); }
    .resume-classic .section-title { font-size: calc(16px * var(--resume-font-scale)); font-weight: bold; text-transform: uppercase; margin: var(--resume-section-margin-top) 0 var(--resume-section-margin-bottom); border-bottom: 1px solid #ccc; }
    .resume-classic .item { margin-bottom: var(--resume-item-margin); }
    .resume-classic .item-header { display: flex; justify-content: space-between; font-weight: bold; }
    .resume-classic .item-desc { font-size: calc(14px * var(--resume-font-scale)); margin-top: var(--resume-desc-margin); }

    @media (max-width: 1535px) {
        .resume-view-switch {
            display: flex;
        }

        .resume-workspace {
            display: block;
            height: calc(100vh - 9rem);
            min-height: 560px;
        }

        .resume-workspace[data-active-view="editor"] .resume-preview-pane,
        .resume-workspace[data-active-view="preview"] .resume-editor-pane {
            display: none;
        }

        .resume-editor-pane,
        .resume-preview-pane {
            height: 100%;
        }
    }

    @media (max-width: 767px) {
        .resume-workspace {
            height: auto;
            min-height: 0;
        }

        .resume-editor-body {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .resume-section-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0 0 4px;
        }

        .section-nav-row {
            grid-template-columns: minmax(140px, 1fr) auto;
            min-width: 210px;
            margin-bottom: 0;
        }

        .resume-section-editor {
            padding: 14px;
            overflow: visible;
        }

        .section-form-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
    // 初始数据 (从后端注入)
    let resumeData = {{ resume.content | tojson }} || {};
    const resumeId = {{ resume.id }};
    let currentTemplate = "{{ resume.template_id }}" || 'modern';
    let activeSection = 'basic';
    let activeWorkspaceView = 'editor';
    const sectionMeta = [
        { key: 'basic', icon: '👤', title: '基本信息' },
        { key: 'education', icon: '🎓', title: '教育背景' },
        { key: 'experience', icon: '💼', title: '实习/工作经历' },
        { key: 'projects', icon: '🚀', title: '项目经验' },
        { key: 'campus_experience', icon: '🏫', title: '校园内经历' },
        { key: 'awards', icon: '🏆', title: '获奖' },
        { key: 'skills', icon: '🛠', title: '技能与证书' }
    ];

    // 数据结构标准化初始化
    if (!resumeData.basic) resumeData.basic = {};
    if (!resumeData.education) resumeData.education = [];
    if (!resumeData.experience) resumeData.experience = [];
    if (!resumeData.projects) resumeData.projects = [];
    if (!resumeData.campus_experience || !Array.isArray(resumeData.campus_experience)) resumeData.campus_experience = [];
    if (resumeData.campus_experience.length === 0) resumeData.campus_experience.push({});
    if (!resumeData.awards || !Array.isArray(resumeData.awards)) resumeData.awards = [];
    if (resumeData.awards.length === 0) resumeData.awards.push({});
    if (!resumeData.skills) resumeData.skills = [];
    const defaultHiddenSections = {
        basic: false,
        education: false,
        experience: false,
        projects: false,
        campus_experience: false,
        awards: false,
        skills: false
    };
    if (!resumeData.hiddenSections || typeof resumeData.hiddenSections !== 'object' || Array.isArray(resumeData.hiddenSections)) resumeData.hiddenSections = {};
    resumeData.hiddenSections = { ...defaultHiddenSections, ...resumeData.hiddenSections };
    const layoutPresets = [
        { fontScale: 1, lineHeight: 1.6, sectionTop: 20, sectionBottom: 15, sectionPadding: 5, itemMargin: 20, itemHeaderMargin: 4, descMargin: 5, modernPaddingY: 30, modernMainPaddingX: 30, modernSidebarPaddingX: 20, classicPadding: 40, classicHeaderPadding: 20, classicHeaderMargin: 20, contactMargin: 10, skillPaddingY: 4, skillPaddingX: 8, skillMarginBottom: 6 },
        { fontScale: 0.98, lineHeight: 1.5, sectionTop: 18, sectionBottom: 13, sectionPadding: 4, itemMargin: 17, itemHeaderMargin: 3, descMargin: 4, modernPaddingY: 28, modernMainPaddingX: 28, modernSidebarPaddingX: 18, classicPadding: 36, classicHeaderPadding: 18, classicHeaderMargin: 18, contactMargin: 8, skillPaddingY: 3, skillPaddingX: 7, skillMarginBottom: 5 },
        { fontScale: 0.96, lineHeight: 1.42, sectionTop: 16, sectionBottom: 11, sectionPadding: 4, itemMargin: 14, itemHeaderMargin: 3, descMargin: 4, modernPaddingY: 26, modernMainPaddingX: 26, modernSidebarPaddingX: 17, classicPadding: 32, classicHeaderPadding: 16, classicHeaderMargin: 15, contactMargin: 7, skillPaddingY: 3, skillPaddingX: 7, skillMarginBottom: 4 },
        { fontScale: 0.94, lineHeight: 1.36, sectionTop: 14, sectionBottom: 9, sectionPadding: 3, itemMargin: 12, itemHeaderMargin: 2, descMargin: 3, modernPaddingY: 24, modernMainPaddingX: 24, modernSidebarPaddingX: 16, classicPadding: 29, classicHeaderPadding: 14, classicHeaderMargin: 13, contactMargin: 6, skillPaddingY: 2, skillPaddingX: 6, skillMarginBottom: 4 },
        { fontScale: 0.92, lineHeight: 1.32, sectionTop: 12, sectionBottom: 8, sectionPadding: 3, itemMargin: 10, itemHeaderMargin: 2, descMargin: 3, modernPaddingY: 22, modernMainPaddingX: 22, modernSidebarPaddingX: 15, classicPadding: 26, classicHeaderPadding: 12, classicHeaderMargin: 11, contactMargin: 5, skillPaddingY: 2, skillPaddingX: 6, skillMarginBottom: 3 },
        { fontScale: 0.9, lineHeight: 1.28, sectionTop: 10, sectionBottom: 6, sectionPadding: 2, itemMargin: 8, itemHeaderMargin: 2, descMargin: 2, modernPaddingY: 20, modernMainPaddingX: 20, modernSidebarPaddingX: 14, classicPadding: 24, classicHeaderPadding: 10, classicHeaderMargin: 10, contactMargin: 4, skillPaddingY: 2, skillPaddingX: 5, skillMarginBottom: 3 },
        { fontScale: 0.88, lineHeight: 1.22, sectionTop: 8, sectionBottom: 5, sectionPadding: 2, itemMargin: 6, itemHeaderMargin: 1, descMargin: 2, modernPaddingY: 18, modernMainPaddingX: 18, modernSidebarPaddingX: 12, classicPadding: 22, classicHeaderPadding: 8, classicHeaderMargin: 8, contactMargin: 3, skillPaddingY: 1, skillPaddingX: 5, skillMarginBottom: 2 }
    ];
    if (!resumeData.layout || typeof resumeData.layout !== 'object' || Array.isArray(resumeData.layout)) resumeData.layout = {};
    resumeData.layout = { density: 0, ...resumeData.layout };

    // 初始化页面
    document.addEventListener('DOMContentLoaded', () => {
        // 填充表单
        fillForm();
        // 渲染预览
        renderPreview();
        // 设置选择框
        document.querySelector('select').value = currentTemplate;
        setWorkspaceView(activeWorkspaceView, false);

        // Auto-print check for dashboard "Download PDF"
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('print')) {
            // Delay slightly to ensure rendering is complete
            setTimeout(exportPDF, 800);
        }
    });

    // --- 表单逻辑 ---

    function fillForm() {
        renderSectionNav();
        renderSectionEditor(activeSection);
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function escapeAttr(value) {
        return escapeHtml(value);
    }

    function getSectionMeta(section) {
        return sectionMeta.find(item => item.key === section) || sectionMeta[0];
    }

    function setWorkspaceView(view, updateButtons = true) {
        activeWorkspaceView = view === 'preview' ? 'preview' : 'editor';
        const workspace = document.getElementById('resume-workspace');
        if (workspace) workspace.dataset.activeView = activeWorkspaceView;

        if (updateButtons) {
            const editorBtn = document.getElementById('workspace-editor-btn');
            const previewBtn = document.getElementById('workspace-preview-btn');
            if (editorBtn && previewBtn) {
                editorBtn.className = activeWorkspaceView === 'editor' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
                previewBtn.className = activeWorkspaceView === 'preview' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
            }
        }
    }

    function setActiveSection(section) {
        activeSection = sectionMeta.some(item => item.key === section) ? section : 'basic';
        renderSectionNav();
        renderSectionEditor(activeSection);
        setWorkspaceView('editor');
    }

    function renderSectionNav() {
        const nav = document.getElementById('section-nav');
        if (!nav) return;

        nav.innerHTML = sectionMeta.map(section => {
            const hidden = !!resumeData.hiddenSections[section.key];
            const active = activeSection === section.key;

            return `
                <div class="section-nav-row ${active ? 'is-active' : ''} ${hidden ? 'is-hidden' : ''}">
                    <button type="button" class="section-nav-main" onclick="setActiveSection('${section.key}')">
                        <span class="section-nav-icon">${section.icon}</span>
                        <span class="min-w-0">
                            <span class="section-nav-title">${section.title}</span>
                            ${hidden ? '<span class="section-hidden-badge">已隐藏</span>' : ''}
                        </span>
                    </button>
                    <label class="section-hide-toggle label cursor-pointer gap-1 p-0 font-normal" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()">
                        <span class="label-text text-xs">隐藏</span>
                        <input type="checkbox" class="checkbox checkbox-xs" id="hide-${section.key}" ${hidden ? 'checked' : ''} onchange="updateHiddenSection('${section.key}', this.checked)">
                    </label>
                </div>
            `;
        }).join('');
    }

    function renderSectionEditor(section) {
        const editor = document.getElementById('section-editor');
        if (!editor) return;

        const meta = getSectionMeta(section);
        editor.innerHTML = `
            <div class="section-editor-header">
                <div>
                    <div class="section-editor-kicker">当前模块</div>
                    <div class="section-editor-title">${meta.icon} ${meta.title}</div>
                </div>
            </div>
            ${renderSectionEditorBody(section)}
        `;

        if (['education', 'experience', 'projects', 'campus_experience', 'awards'].includes(section)) {
            renderListEditors(section);
        }
    }

    function renderSectionEditorBody(section) {
        const b = resumeData.basic || {};

        if (section === 'basic') {
            return `
                <div class="section-form-grid">
                    <div class="form-control">
                        <label class="label"><span class="label-text">姓名</span></label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.name)}" oninput="updateField('basic', 'name', this.value)" id="input-name">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text">求职意向</span></label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.job_target)}" oninput="updateField('basic', 'job_target', this.value)" id="input-job_target">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text">电话</span></label>
                        <input type="text" class="input input-bordered input-sm" value="${escapeAttr(b.phone)}" oninput="updateField('basic', 'phone', this.value)" id="input-phone">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text">邮箱</span></label>

    function getLayoutDensity() {
        const density = Number(resumeData.layout?.density || 0);
        if (!Number.isFinite(density)) return 0;
        return Math.min(Math.max(Math.round(density), 0), layoutPresets.length - 1);
    }

    function applyLayoutDensity(density, shouldStore = true) {
        const container = document.getElementById('resume-preview');
        if (!container) return;

        const safeDensity = Math.min(Math.max(Math.round(density), 0), layoutPresets.length - 1);
        const preset = layoutPresets[safeDensity];
        const cssVars = {
            fontScale: '--resume-font-scale',
            lineHeight: '--resume-line-height',
            sectionTop: '--resume-section-margin-top',
            sectionBottom: '--resume-section-margin-bottom',
            sectionPadding: '--resume-section-padding-bottom',
            itemMargin: '--resume-item-margin',
            itemHeaderMargin: '--resume-item-header-margin',
            descMargin: '--resume-desc-margin',
            modernPaddingY: '--resume-modern-padding-y',
            modernMainPaddingX: '--resume-modern-main-padding-x',
            modernSidebarPaddingX: '--resume-modern-sidebar-padding-x',
            classicPadding: '--resume-classic-padding',
            classicHeaderPadding: '--resume-classic-header-padding',
            classicHeaderMargin: '--resume-classic-header-margin',
            contactMargin: '--resume-contact-margin',
            skillPaddingY: '--resume-skill-padding-y',
            skillPaddingX: '--resume-skill-padding-x',
            skillMarginBottom: '--resume-skill-margin-bottom'
        };

        Object.entries(cssVars).forEach(([key, cssVar]) => {
            const value = preset[key];
            const cssValue = key === 'fontScale' || key === 'lineHeight' ? value : `${value}px`;
            container.style.setProperty(cssVar, cssValue);
        });

        if (shouldStore) {
            resumeData.layout.density = safeDensity;
        }
    }

    // --- 功能函数 ---

    function changeTemplate(tpl) {
        currentTemplate = tpl;
        renderPreview();
        showUnsaved();

    function nextPaint() {
        return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    function getA4HeightPx() {
        const probe = document.createElement('div');
        probe.style.position = 'absolute';
        probe.style.visibility = 'hidden';
        probe.style.pointerEvents = 'none';
        probe.style.height = '297mm';
        probe.style.width = '1px';
        document.body.appendChild(probe);
        const height = probe.getBoundingClientRect().height;
        probe.remove();
        return height;
    }

    function previewFitsOnePage() {
        const container = document.getElementById('resume-preview');
        if (!container) return true;
        return container.scrollHeight <= getA4HeightPx() + 4;
    }

    async function fitOnePage() {
        const btn = document.getElementById('btn-fit-one-page');
        const originalText = btn.innerText;
        btn.innerText = '调整中...';
        btn.disabled = true;

        try {
            renderPreview();
            let fittedDensity = layoutPresets.length - 1;

            for (let density = 0; density < layoutPresets.length; density++) {
                applyLayoutDensity(density);
                await nextPaint();

                if (previewFitsOnePage()) {
                    fittedDensity = density;
                    break;
                }
            }

            applyLayoutDensity(fittedDensity);
            await nextPaint();
            showUnsaved();

            const status = document.getElementById('save-status');
            if (status) {
                status.innerText = fittedDensity === 0 ? '未保存（一页纸：无需压缩）' : `未保存（一页纸：紧凑 ${fittedDensity}）`;
            }

            if (!previewFitsOnePage()) {
                alert('已调整到最紧凑排版，但当前内容可能仍超过一页。可以尝试隐藏部分模块或精简内容。');
            }
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    async function saveResume() {
        const btn = document.querySelector('button[onclick="saveResume()"]');
        const originalText = btn.innerText;
        btn.innerText = '保存中...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/resume/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: resumeId,
                    content: resumeData,
                    template_id: currentTemplate,
                    title: resumeData.basic.name + '的简历'
                })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('save-status').innerText = '已保存 ' + new Date().toLocaleTimeString();
                document.getElementById('save-status').classList.remove('text-error');
            } else {
                alert('保存失败: ' + data.error);
            }
        } catch (e) {
            alert('网络错误');
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function showUnsaved() {
        document.getElementById('save-status').innerText = '未保存';
        document.getElementById('save-status').classList.add('text-error');
    }

    // --- AI 优化相关 ---
    
    let currentOptimizingField = null; // { type, index, key }

    async function optimizeField(type, index, key) {
        // 获取当前内容
        let content = '';
        let fieldLabel = '';
        
        if (type === 'basic') {
            content = resumeData.basic[key];
            fieldLabel = '自我评价';
        } else if (type === 'experience' || type === 'projects') {
            content = resumeData[type][index][key];
            fieldLabel = type === 'experience' ? '工作经历描述' : '项目描述';
        }
        
        if (!content || content.length < 5) {
            alert('内容太短，无法优化');
            return;
        }

        // 显示 Loading 状态 (在按钮上)
        const btnId = `btn-opt-${type}-${index}-${key}`;
        const btn = document.getElementById(btnId);
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span>';
        btn.disabled = true;

        try {
            const res = await fetch('/api/resume/optimize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    content: content,
                    type: fieldLabel
                })
            });
            const data = await res.json();
            
            if (data.success) {
                showSuggestionPopup(type, index, key, data.suggestion);
            } else {
                alert('AI 优化失败: ' + (data.error || '未知错误'));
            }
        } catch (e) {
            console.error(e);
            alert('请求出错');
        } finally {
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }
    }

function showSuggestionPopup(type, index, key, suggestion) {
        // 1. 移除旧的弹窗
        const oldPopup = document.getElementById('ai-suggestion-popup');
        if (oldPopup) oldPopup.remove();

        // 2. 找到目标输入框
        let targetInputId = '';
        if (type === 'basic') {
            targetInputId = `input-${key}`;
        } else {
            targetInputId = `input-${type}-${index}-${key}`;
        }
        
        const targetInput = document.getElementById(targetInputId);
        if (!targetInput) return;

        // 3. 【核心修改】计算目标输入框在页面中的绝对位置
        const rect = targetInput.getBoundingClientRect();
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;

        // 4. 创建浮窗
        const popup = document.createElement('div');
        popup.id = 'ai-suggestion-popup';
        
        // 样式修改：
        // - position: absolute (配合 body 使用)
        // - z-index: 9999 (确保最高层级)
        // - 保持橙色主题
        popup.className = 'bg-orange-50 shadow-2xl border-2 border-orange-400 rounded-xl p-4 animate-in fade-in slide-in-from-top-2';
        
        // 【核心修改】直接设置内联样式来定位
        popup.style.position = 'absolute';
        popup.style.zIndex = '9999';
        popup.style.width = rect.width + 'px'; // 宽度与输入框一致
        popup.style.top = (rect.bottom + scrollTop + 6) + 'px'; // 位于输入框下方 + 6px 间距
        popup.style.left = (rect.left + scrollLeft) + 'px'; // 左对齐

        popup.innerHTML = `
            <div class="flex justify-between items-center mb-2">
                <div class="text-xs font-bold text-orange-600 flex items-center gap-1">
                    ✨ AI 优化建议
                </div>
                <div class="flex gap-1">
                    <button onclick="applySuggestion('${type}', '${index}', '${key}')" class="btn btn-xs bg-orange-500 hover:bg-orange-600 text-white border-none" title="应用">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                        应用
                    </button>
                    <button onclick="closeSuggestion()" class="btn btn-xs btn-ghost text-base-content/50" title="忽略">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
            </div>
            <div class="text-sm text-gray-700 p-1 rounded-lg max-h-40 overflow-y-auto whitespace-pre-wrap" id="suggestion-text">${suggestion}</div>
        `;

        // 5. 【核心修改】将弹窗追加到 body，而不是 input 的父级
        document.body.appendChild(popup);
        
        // 监听一次点击外部关闭（可选优化体验）
        setTimeout(() => {
            const closeOnClickOutside = (e) => {
                if (!popup.contains(e.target) && e.target !== targetInput) {
                    closeSuggestion();
                    document.removeEventListener('click', closeOnClickOutside);
                }
            };
            document.addEventListener('click', closeOnClickOutside);
        }, 100);
    }
    function applySuggestion(type, index, key) {
        const text = document.getElementById('suggestion-text').innerText;
        
        if (type === 'basic') {
            updateField('basic', key, text);
            document.getElementById(`input-${key}`).value = text;
        } else {
            updateListItem(type, index, key, text);
            const el = document.getElementById(`input-${type}-${index}-${key}`);
            if (el) el.value = text;
        }
        closeSuggestion();
    }

    function closeSuggestion() {
        const popup = document.getElementById('ai-suggestion-popup');
        if (popup) popup.remove();
    }

    // --- 导出功能 ---

function exportPDF() {
    // 1. 更改网页标题（因为浏览器打印默认用网页标题作为文件名）
    const originalTitle = document.title;
    const name = resumeData.basic.name || '简历';
    document.title = `${name}_简历`;

    // 2. 调用浏览器打印
    window.print();

    // 3. 恢复标题
    //由于 print 是阻塞的（或在某些浏览器是非阻塞的），建议用 timeout 恢复
    setTimeout(() => {
        document.title = originalTitle;
    }, 1000);
}
</script>
{% endblock %}
