{% extends "base.html" %}

{% block title %}简历预览{% endblock %}

{% block content %}
<!-- 引入 html2pdf (与编辑器保持一致，虽然这里主要用 print) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<div class="space-y-4">
    <div class="bg-base-100 p-4 rounded-xl shadow-sm border border-base-200 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div class="min-w-0">
            <div class="text-sm text-base-content/60">只读预览</div>
            <h2 class="text-xl font-bold text-base-content truncate">
                {{ student.truename or student.username }} · {{ resume.title or '我的简历' }}
            </h2>
            <div class="text-xs text-base-content/60 mt-1">
                {{ (student.department or '-') ~ ' / ' ~ (student.class_name or '-') }}
                <span class="mx-1">|</span>
                学号：{{ student.student_id or '-' }}
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-2">
            <select class="select select-sm select-bordered" onchange="changeTemplate(this.value)">
                <option value="modern">现代简约 (Modern)</option>
                <option value="classic">经典商务 (Classic)</option>
                <option value="ats">ATS专业 (ATS)</option>
                <option value="campus">校园清新 (Campus)</option>
                <option value="minimal">极简单栏 (Minimal)</option>
                <option value="business">商务双栏 (Business)</option>
                <option value="creative">创意彩色 (Creative)</option>
                <option value="tech">深色科技 (Tech)</option>
            </select>
            <button onclick="fitOnePage()" class="btn btn-sm btn-accent text-white" id="btn-fit-one-page">智能一页纸</button>
            <button onclick="exportPDF()" class="btn btn-sm btn-secondary text-white">打印 / PDF</button>
        </div>
    </div>

    <div class="bg-base-200/50 rounded-xl border border-base-200 overflow-hidden">
        <div class="overflow-y-auto p-4 flex justify-center bg-gray-100">
            <div id="resume-preview" class="bg-white shadow-xl origin-top transition-transform" style="width: 210mm; min-height: 297mm; padding: 0;"></div>
        </div>
    </div>
</div>

<style>
    @media print {
        html, body {
            -webkit-print-color-adjust: exact !important;
            -moz-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }

        body {
            visibility: hidden;
            background: white;
            margin: 0;
            padding: 0;
        }

        #resume-preview {
            visibility: visible;
            position: absolute;
            left: 0;
            top: 0;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            box-shadow: none !important;
            border: none !important;
            transform: none !important;
            z-index: 9999;
            background: white;
        }

        #resume-preview * {
            visibility: visible;
        }

        @page {
            margin: 0;
            size: auto;
        }
    }

    /* 预览样式：从编辑器复用关键变量与模板样式 */
    #resume-preview {
        --resume-font-scale: 1;
        --resume-line-height: 1.6;
        --resume-section-margin-top: 20px;
        --resume-section-margin-bottom: 15px;
        --resume-section-padding-bottom: 5px;
        --resume-item-margin: 20px;
        --resume-item-header-margin: 4px;
        --resume-desc-margin: 5px;
        --resume-modern-padding-y: 30px;
        --resume-modern-main-padding-x: 30px;
        --resume-modern-sidebar-padding-x: 20px;
        --resume-classic-padding: 40px;
        --resume-classic-header-padding: 20px;
        --resume-classic-header-margin: 20px;
        --resume-contact-margin: 10px;
        --resume-skill-padding-y: 4px;
        --resume-skill-padding-x: 8px;
        --resume-skill-margin-bottom: 6px;
    }

    .resume-modern { font-family: 'Segoe UI', sans-serif; color: #333; line-height: var(--resume-line-height); display: flex; min-height: 297mm; font-size: calc(14px * var(--resume-font-scale)); }
    .resume-modern .sidebar { width: 30%; background: #f8f9fa; border-right: 1px solid #eee; padding: var(--resume-modern-padding-y) var(--resume-modern-sidebar-padding-x); }
    .resume-modern .main { width: 70%; padding: var(--resume-modern-padding-y) var(--resume-modern-main-padding-x); }
    .resume-modern .name { font-size: calc(24px * var(--resume-font-scale)); font-weight: bold; text-align: center; color: #2c3e50; }
    .resume-modern .section-title { font-size: calc(16px * var(--resume-font-scale)); font-weight: bold; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: var(--resume-section-padding-bottom); margin: var(--resume-section-margin-top) 0 var(--resume-section-margin-bottom); }
    .resume-modern .contact-item { font-size: calc(13px * var(--resume-font-scale)); margin-bottom: calc(8px * var(--resume-font-scale)); display: flex; gap: 8px; align-items: center; color: #555; }
    .resume-modern .skill-item { background: #e8f4fd; color: #2980b9; padding: var(--resume-skill-padding-y) var(--resume-skill-padding-x); border-radius: 4px; font-size: calc(12px * var(--resume-font-scale)); margin-bottom: var(--resume-skill-margin-bottom); display: inline-block; margin-right: 4px; }
    .resume-modern .item { margin-bottom: var(--resume-item-margin); }
    .resume-modern .item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: var(--resume-item-header-margin); }
    .resume-modern .item-title { min-width: 0; font-weight: bold; font-size: calc(16px * var(--resume-font-scale)); color: #34495e; overflow-wrap: anywhere; word-break: break-word; }
    .resume-modern .item-subtitle { font-weight: 600; font-size: calc(14px * var(--resume-font-scale)); color: #7f8c8d; }
    .resume-modern .item-date { flex: 0 0 auto; max-width: 35%; text-align: right; font-size: calc(12px * var(--resume-font-scale)); color: #95a5a6; overflow-wrap: anywhere; }
    .resume-modern .item-desc { font-size: calc(13px * var(--resume-font-scale)); color: #555; white-space: pre-line; margin-top: var(--resume-desc-margin); }
    .resume-modern .award-item { margin-bottom: calc(var(--resume-item-margin) * 0.75); }
    .resume-modern .award-title { font-weight: bold; font-size: calc(15px * var(--resume-font-scale)); color: #34495e; line-height: 1.35; overflow-wrap: anywhere; word-break: break-word; }
    .resume-modern .award-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .resume-modern .award-badge { display: inline-flex; align-items: center; max-width: 100%; padding: 2px 7px; border-radius: 999px; background: #eef6fb; color: #607d8b; font-size: calc(11px * var(--resume-font-scale)); line-height: 1.35; overflow-wrap: anywhere; }

    .resume-classic { font-family: 'Times New Roman', serif; color: #000; padding: var(--resume-classic-padding); line-height: var(--resume-line-height); font-size: calc(14px * var(--resume-font-scale)); }
    .resume-classic .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: var(--resume-classic-header-padding); margin-bottom: var(--resume-classic-header-margin); }
    .resume-classic .name { font-size: calc(28px * var(--resume-font-scale)); font-weight: bold; text-transform: uppercase; }
    .resume-classic .contact { font-size: calc(14px * var(--resume-font-scale)); margin-top: var(--resume-contact-margin); }
    .resume-classic .section-title { font-size: calc(16px * var(--resume-font-scale)); font-weight: bold; text-transform: uppercase; margin: var(--resume-section-margin-top) 0 var(--resume-section-margin-bottom); border-bottom: 1px solid #ccc; }
    .resume-classic .item { margin-bottom: var(--resume-item-margin); }
    .resume-classic .item-header { display: flex; justify-content: space-between; font-weight: bold; gap: 10px; }
    .resume-classic .item-desc { font-size: calc(14px * var(--resume-font-scale)); margin-top: var(--resume-desc-margin); white-space: pre-line; }

    .resume-ats,
    .resume-campus,
    .resume-minimal,
    .resume-business,
    .resume-creative,
    .resume-tech {
        min-height: 297mm;
        font-size: calc(13.5px * var(--resume-font-scale));
        line-height: var(--resume-line-height);
        overflow-wrap: anywhere;
        word-break: break-word;
    }
    .tpl-section { margin-top: var(--resume-section-margin-top); }
    .tpl-section:first-child { margin-top: 0; }
    .tpl-section-title { font-size: calc(15px * var(--resume-font-scale)); font-weight: 800; margin-bottom: var(--resume-section-margin-bottom); }
    .tpl-item { margin-bottom: var(--resume-item-margin); }
    .tpl-item-header { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; margin-bottom: var(--resume-item-header-margin); }
    .tpl-item-title { min-width: 0; font-weight: 800; font-size: calc(14px * var(--resume-font-scale)); }
    .tpl-item-date { flex: 0 0 auto; max-width: 34%; text-align: right; color: #73808a; font-size: calc(11.5px * var(--resume-font-scale)); overflow-wrap: anywhere; }
    .tpl-item-subtitle { color: #63707a; font-weight: 650; margin-bottom: 3px; }
    .tpl-item-desc { white-space: pre-line; color: #4a5560; margin-top: var(--resume-desc-margin); }
    .tpl-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tpl-chip { display: inline-flex; align-items: center; max-width: 100%; border-radius: 999px; padding: 2px 8px; font-size: calc(11px * var(--resume-font-scale)); line-height: 1.35; overflow-wrap: anywhere; }
    .tpl-contact { display: flex; flex-wrap: wrap; gap: 8px 14px; color: #5e6872; }
    .tpl-contact span { min-width: 0; overflow-wrap: anywhere; }
    .tpl-award-title { font-weight: 760; color: inherit; }
    .tpl-award-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

    .resume-ats { padding: 34px 42px; font-family: Arial, Helvetica, sans-serif; color: #202428; }
    .resume-ats .ats-header { border-bottom: 2px solid #202428; padding-bottom: 13px; margin-bottom: 18px; }
    .resume-ats .ats-name { font-size: calc(28px * var(--resume-font-scale)); font-weight: 800; letter-spacing: 0; }
    .resume-ats .ats-target { margin-top: 4px; color: #4a4f55; font-weight: 700; }
    .resume-ats .tpl-section-title { color: #202428; border-bottom: 1px solid #aeb6bf; padding-bottom: 4px; text-transform: uppercase; }
    .resume-ats .tpl-chip { background: #f1f3f5; color: #30363d; border: 1px solid #d8dde3; }

    .resume-minimal { padding: 42px 48px; font-family: 'Helvetica Neue', Arial, sans-serif; color: #24292f; }
    .resume-minimal .minimal-header { margin-bottom: 24px; }
    .resume-minimal .minimal-name { font-size: calc(30px * var(--resume-font-scale)); font-weight: 700; }
    .resume-minimal .minimal-target { margin-top: 6px; color: #6b7280; }
    .resume-minimal .tpl-section-title { color: #111827; border-left: 3px solid #111827; padding-left: 10px; }
    .resume-minimal .tpl-item { padding-bottom: 8px; border-bottom: 1px solid #eef0f2; }
    .resume-minimal .tpl-chip { background: #f7f7f8; color: #4b5563; }

    .resume-campus { padding: 30px 34px; font-family: 'Segoe UI', Arial, sans-serif; color: #254155; background: linear-gradient(180deg, #f6fffb 0, #fff 90px); }
    .resume-campus .campus-header { display: grid; grid-template-columns: minmax(0, 1fr) minmax(150px, 42%); gap: 16px; border-bottom: 3px solid #64c8b4; padding-bottom: 16px; margin-bottom: 18px; }
    .resume-campus .campus-header > * { min-width: 0; }
    .resume-campus .campus-header .tpl-contact { justify-content: flex-end; }
    .resume-campus .campus-name { font-size: calc(28px * var(--resume-font-scale)); font-weight: 850; color: #17445c; }
    .resume-campus .campus-target { color: #16876f; font-weight: 750; margin-top: 4px; }
    .resume-campus .tpl-section-title { color: #14745f; background: #e9faf5; border-radius: 999px; padding: 5px 12px; width: fit-content; }
    .resume-campus .tpl-chip { background: #e9faf5; color: #14745f; border: 1px solid #c7efe3; }

    .resume-business { display: grid; grid-template-columns: 32% 68%; min-height: 297mm; font-family: 'Segoe UI', Arial, sans-serif; color: #26313d; }
    .resume-business .business-side { background: #243447; color: #eef4f8; padding: 34px 22px; }
    .resume-business .business-main { padding: 34px 34px; }
    .resume-business .business-name { font-size: calc(26px * var(--resume-font-scale)); font-weight: 850; }
    .resume-business .business-target { color: #bfd0dc; margin-top: 6px; }
    .resume-business .business-side .tpl-section-title { color: #fff; border-bottom: 1px solid rgb(255 255 255 / 0.28); padding-bottom: 5px; }
    .resume-business .business-side .tpl-contact, .resume-business .business-side .tpl-item-desc, .resume-business .business-side .tpl-item-subtitle { color: #dce7ee; }
    .resume-business .business-main .tpl-section-title { color: #243447; border-bottom: 2px solid #d6a95f; padding-bottom: 5px; }
    .resume-business .tpl-chip { background: rgb(255 255 255 / 0.12); color: #eef4f8; border: 1px solid rgb(255 255 255 / 0.16); }

    .resume-creative { padding: 0; font-family: 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; color: #263238; background: #fff; }
    .resume-creative .creative-header { padding: 30px 36px 24px; background: linear-gradient(135deg, #ff8a65, #22a699); color: #fff; }
    .resume-creative .creative-name { font-size: calc(30px * var(--resume-font-scale)); font-weight: 850; }
    .resume-creative .creative-target { margin-top: 6px; font-weight: 700; opacity: 0.92; }
    .resume-creative .creative-body { padding: 28px 36px; }
    .resume-creative .tpl-section-title { color: #14796f; display: flex; align-items: center; gap: 8px; }
    .resume-creative .tpl-section-title::before { content: ""; width: 10px; height: 10px; border-radius: 999px; background: #ff8a65; flex: 0 0 auto; }
    .resume-creative .tpl-item { background: #f7fbfa; border-left: 4px solid #22a699; border-radius: 7px; padding: 10px 12px; }
    .resume-creative .tpl-chip { background: #fff3e0; color: #8a4b00; border: 1px solid #ffd8a8; }

    .resume-tech { display: grid; grid-template-columns: 34% 66%; min-height: 297mm; font-family: 'Segoe UI', Arial, sans-serif; color: #dbeafe; background: #0f172a; }
    .resume-tech .tech-side { background: #111827; padding: 34px 22px; border-right: 1px solid rgb(148 163 184 / 0.22); }
    .resume-tech .tech-main { background: #f8fafc; color: #1e293b; padding: 34px 34px; }
    .resume-tech .tech-name { font-size: calc(26px * var(--resume-font-scale)); font-weight: 850; color: #e0f2fe; }
    .resume-tech .tech-target { color: #67e8f9; margin-top: 6px; }
    .resume-tech .tech-side .tpl-section-title { color: #67e8f9; border-bottom: 1px solid rgb(103 232 249 / 0.32); padding-bottom: 5px; }
    .resume-tech .tech-side .tpl-contact, .resume-tech .tech-side .tpl-item-desc, .resume-tech .tech-side .tpl-item-subtitle { color: #cbd5e1; }
    .resume-tech .tech-main .tpl-section-title { color: #0f766e; border-bottom: 2px solid #14b8a6; padding-bottom: 5px; }
    .resume-tech .tpl-chip { background: rgb(20 184 166 / 0.14); color: #0f766e; border: 1px solid rgb(20 184 166 / 0.22); }
</style>

<script>
    // 初始数据 (从后端注入)
    let resumeData = {{ resume.content | tojson }} || {};
    let currentTemplate = "{{ resume.template_id }}" || 'modern';

    // 数据结构标准化初始化（与编辑器保持一致，防止旧数据缺字段）
    if (!resumeData.basic) resumeData.basic = {};
    if (!resumeData.education) resumeData.education = [];
    if (!resumeData.experience) resumeData.experience = [];
    if (!resumeData.projects) resumeData.projects = [];
    if (!resumeData.campus_experience || !Array.isArray(resumeData.campus_experience)) resumeData.campus_experience = [];
    if (!resumeData.awards || !Array.isArray(resumeData.awards)) resumeData.awards = [];
    if (!resumeData.skills) resumeData.skills = [];
    const defaultHiddenSections = {
        basic: false,
        education: false,
        experience: false,
        projects: false,
        campus_experience: false,
        awards: false,
        skills: false
    };
    if (!resumeData.hiddenSections || typeof resumeData.hiddenSections !== 'object' || Array.isArray(resumeData.hiddenSections)) resumeData.hiddenSections = {};
    resumeData.hiddenSections = { ...defaultHiddenSections, ...resumeData.hiddenSections };

    const layoutPresets = [
        { fontScale: 1, lineHeight: 1.6, sectionTop: 20, sectionBottom: 15, sectionPadding: 5, itemMargin: 20, itemHeaderMargin: 4, descMargin: 5, modernPaddingY: 30, modernMainPaddingX: 30, modernSidebarPaddingX: 20, classicPadding: 40, classicHeaderPadding: 20, classicHeaderMargin: 20, contactMargin: 10, skillPaddingY: 4, skillPaddingX: 8, skillMarginBottom: 6 },
        { fontScale: 0.98, lineHeight: 1.5, sectionTop: 18, sectionBottom: 13, sectionPadding: 4, itemMargin: 17, itemHeaderMargin: 3, descMargin: 4, modernPaddingY: 28, modernMainPaddingX: 28, modernSidebarPaddingX: 18, classicPadding: 36, classicHeaderPadding: 18, classicHeaderMargin: 18, contactMargin: 8, skillPaddingY: 3, skillPaddingX: 7, skillMarginBottom: 5 },
        { fontScale: 0.96, lineHeight: 1.42, sectionTop: 16, sectionBottom: 11, sectionPadding: 4, itemMargin: 14, itemHeaderMargin: 3, descMargin: 4, modernPaddingY: 26, modernMainPaddingX: 26, modernSidebarPaddingX: 17, classicPadding: 32, classicHeaderPadding: 16, classicHeaderMargin: 15, contactMargin: 7, skillPaddingY: 3, skillPaddingX: 7, skillMarginBottom: 4 },
        { fontScale: 0.94, lineHeight: 1.36, sectionTop: 14, sectionBottom: 9, sectionPadding: 3, itemMargin: 12, itemHeaderMargin: 2, descMargin: 3, modernPaddingY: 24, modernMainPaddingX: 24, modernSidebarPaddingX: 16, classicPadding: 29, classicHeaderPadding: 14, classicHeaderMargin: 13, contactMargin: 6, skillPaddingY: 2, skillPaddingX: 6, skillMarginBottom: 4 },
        { fontScale: 0.92, lineHeight: 1.32, sectionTop: 12, sectionBottom: 8, sectionPadding: 3, itemMargin: 10, itemHeaderMargin: 2, descMargin: 3, modernPaddingY: 22, modernMainPaddingX: 22, modernSidebarPaddingX: 15, classicPadding: 26, classicHeaderPadding: 12, classicHeaderMargin: 11, contactMargin: 5, skillPaddingY: 2, skillPaddingX: 6, skillMarginBottom: 3 },
        { fontScale: 0.9, lineHeight: 1.28, sectionTop: 10, sectionBottom: 6, sectionPadding: 2, itemMargin: 8, itemHeaderMargin: 2, descMargin: 2, modernPaddingY: 20, modernMainPaddingX: 20, modernSidebarPaddingX: 14, classicPadding: 24, classicHeaderPadding: 10, classicHeaderMargin: 10, contactMargin: 4, skillPaddingY: 2, skillPaddingX: 5, skillMarginBottom: 3 },
        { fontScale: 0.88, lineHeight: 1.22, sectionTop: 8, sectionBottom: 5, sectionPadding: 2, itemMargin: 6, itemHeaderMargin: 1, descMargin: 2, modernPaddingY: 18, modernMainPaddingX: 18, modernSidebarPaddingX: 12, classicPadding: 22, classicHeaderPadding: 8, classicHeaderMargin: 8, contactMargin: 3, skillPaddingY: 1, skillPaddingX: 5, skillMarginBottom: 2 }
    ];
    if (!resumeData.layout || typeof resumeData.layout !== 'object' || Array.isArray(resumeData.layout)) resumeData.layout = {};
    resumeData.layout = { density: 0, ...resumeData.layout };

    document.addEventListener('DOMContentLoaded', () => {
        // 设置选择框
        document.querySelector('select').value = currentTemplate === 'classic' ? 'classic' : currentTemplate;
        renderPreview();
    });

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function renderPreviewContact(b) {
        const contacts = [
            b.phone ? `电话：${b.phone}` : '',
            b.email ? `邮箱：${b.email}` : '',
            b.location ? `城市：${b.location}` : ''
        ].filter(Boolean);

        if (contacts.length === 0) return '';
        const content = contacts.map(item => `<span>${escapeHtml(item)}</span>`).join('');
        return `<div class="tpl-contact">${content}</div>`;
    }

    function renderPreviewSection(title, content) {
        if (!String(content || '').trim()) return '';
        return `
            <section class="tpl-section">
                <div class="tpl-section-title">${title}</div>
                ${content}
            </section>
        `;
    }

    function renderPreviewItem({ title, subtitle = '', date = '', desc = '' }) {
        return `
            <div class="tpl-item">
                <div class="tpl-item-header">
                    <span class="tpl-item-title">${escapeHtml(title)}</span>
                    ${date ? `<span class="tpl-item-date">${escapeHtml(date)}</span>` : ''}
                </div>
                ${subtitle ? `<div class="tpl-item-subtitle">${escapeHtml(subtitle)}</div>` : ''}
                ${desc ? `<div class="tpl-item-desc">${escapeHtml(desc)}</div>` : ''}
            </div>
        `;
    }

    function renderPreviewAwards(items) {
        return items.map(item => `
            <div class="tpl-item">
                <div class="tpl-award-title">${escapeHtml(item.name || '获奖名称')}</div>
                <div class="tpl-award-meta">
                    ${item.rank ? `<span class="tpl-chip">${escapeHtml(item.rank)}</span>` : ''}
                    ${item.level ? `<span class="tpl-chip">${escapeHtml(item.level)}</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderPreviewSkills(items) {
        return `<div class="tpl-chip-row">${items.map(skill => `<span class="tpl-chip">${escapeHtml(skill)}</span>`).join('')}</div>`;
    }

    function renderPreviewContentBlock(p, key) {
        const renderers = {
            summary: () => p.showBasic && p.b.self_evaluation ? `<div class="tpl-item-desc">${escapeHtml(p.b.self_evaluation)}</div>` : '',
            education: () => p.educationItems.map(item => renderPreviewItem({ title: item.school || '学校', subtitle: item.major || '', date: item.date || '' })).join(''),
            experience: () => p.experienceItems.map(item => renderPreviewItem({ title: item.company || '公司', subtitle: item.position || '', date: item.date || '', desc: item.description || '' })).join(''),
            projects: () => p.projectItems.map(item => renderPreviewItem({ title: item.name || '项目', subtitle: item.role || '', date: item.date || '', desc: item.description || '' })).join(''),
            campus: () => p.campusItems.map(item => renderPreviewItem({ title: item.organization || '社团/组织', subtitle: item.position || '', desc: item.achievements || '' })).join(''),
            awards: () => renderPreviewAwards(p.awardItems),
            skills: () => p.skillItems.length > 0 ? renderPreviewSkills(p.skillItems) : ''
        };
        return renderers[key] ? renderers[key]() : '';
    }

    function renderPreviewSections(p, sections) {
        const labels = {
            summary: '自我评价',
            education: '教育背景',
            experience: '实习/工作经历',
            projects: '项目经验',
            campus: '校园内经历',
            awards: '获奖',
            skills: '技能与证书'
        };

        return sections.map(key => renderPreviewSection(labels[key], renderPreviewContentBlock(p, key))).join('');
    }

    function getLayoutDensity() {
        const density = Number(resumeData.layout?.density || 0);
        if (!Number.isFinite(density)) return 0;
        return Math.min(Math.max(Math.round(density), 0), layoutPresets.length - 1);
    }

    function applyLayoutDensity(density, shouldStore = true) {
        const container = document.getElementById('resume-preview');
        if (!container) return;

        const safeDensity = Math.min(Math.max(Math.round(density), 0), layoutPresets.length - 1);
        const preset = layoutPresets[safeDensity];
        const cssVars = {
            fontScale: '--resume-font-scale',
            lineHeight: '--resume-line-height',
            sectionTop: '--resume-section-margin-top',
            sectionBottom: '--resume-section-margin-bottom',
            sectionPadding: '--resume-section-padding-bottom',
            itemMargin: '--resume-item-margin',
            itemHeaderMargin: '--resume-item-header-margin',
            descMargin: '--resume-desc-margin',
            modernPaddingY: '--resume-modern-padding-y',
            modernMainPaddingX: '--resume-modern-main-padding-x',
            modernSidebarPaddingX: '--resume-modern-sidebar-padding-x',
            classicPadding: '--resume-classic-padding',
            classicHeaderPadding: '--resume-classic-header-padding',
            classicHeaderMargin: '--resume-classic-header-margin',
            contactMargin: '--resume-contact-margin',
            skillPaddingY: '--resume-skill-padding-y',
            skillPaddingX: '--resume-skill-padding-x',
            skillMarginBottom: '--resume-skill-margin-bottom'
        };

        Object.entries(cssVars).forEach(([key, cssVar]) => {
            const value = preset[key];
            const cssValue = key === 'fontScale' || key === 'lineHeight' ? value : `${value}px`;
            container.style.setProperty(cssVar, cssValue);
        });

        if (shouldStore) {
            resumeData.layout.density = safeDensity;
        }
    }

    function renderPreview() {
        const container = document.getElementById('resume-preview');
        const d = resumeData;
        const b = d.basic || {};
        const hidden = d.hiddenSections || {};
        const sectionVisible = (section) => !hidden[section];
        const hasText = (value) => String(value || '').trim().length > 0;
        const filterItems = (items, keys) => (items || []).filter(item => item && keys.some(key => hasText(item[key])));
        const educationItems = filterItems(d.education, ['school', 'major', 'date']);
        const experienceItems = filterItems(d.experience, ['company', 'position', 'date', 'description']);
        const projectItems = filterItems(d.projects, ['name', 'role', 'date', 'description']);
        const campusItems = filterItems(d.campus_experience, ['organization', 'position', 'achievements']);
        const awardItems = filterItems(d.awards, ['name', 'rank', 'level']);
        const skillItems = (d.skills || []).filter(hasText);
        const showBasic = sectionVisible('basic');
        const showSkills = sectionVisible('skills') && skillItems.length > 0;

        const p = {
            b,
            showBasic,
            educationItems: sectionVisible('education') ? educationItems : [],
            experienceItems: sectionVisible('experience') ? experienceItems : [],
            projectItems: sectionVisible('projects') ? projectItems : [],
            campusItems: sectionVisible('campus_experience') ? campusItems : [],
            awardItems: sectionVisible('awards') ? awardItems : [],
            skillItems: showSkills ? skillItems : []
        };

        if (currentTemplate === 'modern') {
            container.innerHTML = `
                <div class="resume-modern">
                    <div class="sidebar">
                        ${showBasic ? `
                            <div class="name" style="margin-bottom:20px; text-align:left;">${escapeHtml(b.name || '姓名')}</div>

                            <div class="section-title">联系方式</div>
                            ${b.phone ? `<div class="contact-item">📞 ${escapeHtml(b.phone)}</div>` : ''}
                            ${b.email ? `<div class="contact-item">✉️ ${escapeHtml(b.email)}</div>` : ''}
                            ${b.location ? `<div class="contact-item">📍 ${escapeHtml(b.location)}</div>` : ''}

                            <div class="section-title">求职意向</div>
                            <div class="contact-item">${escapeHtml(b.job_target || '未填写')}</div>
                        ` : ''}

                        ${showSkills ? `
                            <div class="section-title">技能专长</div>
                            <div>
                                ${skillItems.map(s => `<span class="skill-item">${escapeHtml(s)}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="main">
                        ${showBasic ? `
                            <div class="section-title" style="margin-top:0;">自我评价</div>
                            <p class="item-desc">${escapeHtml(b.self_evaluation || '暂无')}</p>
                        ` : ''}

                        ${sectionVisible('experience') && experienceItems.length > 0 ? `<div class="section-title">工作经历</div>` : ''}
                        ${sectionVisible('experience') ? experienceItems.map(item => `
                            <div class="item">
                                <div class="item-header">
                                    <span class="item-title">${escapeHtml(item.company || '公司')}</span>
                                    <span class="item-date">${escapeHtml(item.date || '')}</span>
                                </div>
                                <div class="item-subtitle">${escapeHtml(item.position || '职位')}</div>
                                <div class="item-desc">${escapeHtml(item.description || '')}</div>
                            </div>
                        `).join('') : ''}

                        ${sectionVisible('projects') && projectItems.length > 0 ? `<div class="section-title">项目经验</div>` : ''}
                        ${sectionVisible('projects') ? projectItems.map(item => `
                            <div class="item">
                                <div class="item-header">
                                    <span class="item-title">${escapeHtml(item.name || '项目')}</span>
                                    <span class="item-date">${escapeHtml(item.date || '')}</span>
                                </div>
                                <div class="item-subtitle">${escapeHtml(item.role || '角色')}</div>
                                <div class="item-desc">${escapeHtml(item.description || '')}</div>
                            </div>
                        `).join('') : ''}

                        ${sectionVisible('campus_experience') && campusItems.length > 0 ? `<div class="section-title">校园内经历</div>` : ''}
                        ${sectionVisible('campus_experience') ? campusItems.map(item => `
                            <div class="item">
                                <div class="item-header">
                                    <span class="item-title">${escapeHtml(item.organization || '社团/组织')}</span>
                                </div>
                                <div class="item-subtitle">${escapeHtml(item.position || '担任岗位')}</div>
                                <div class="item-desc">${escapeHtml(item.achievements || '')}</div>
                            </div>
                        `).join('') : ''}

                        ${sectionVisible('awards') && awardItems.length > 0 ? `<div class="section-title">获奖</div>` : ''}
                        ${sectionVisible('awards') ? awardItems.map(item => `
                            <div class="award-item">
                                <div class="award-title">${escapeHtml(item.name || '获奖名称')}</div>
                                <div class="award-meta">
                                    ${item.rank ? `<span class="award-badge">${escapeHtml(item.rank)}</span>` : ''}
                                    ${item.level ? `<span class="award-badge">${escapeHtml(item.level)}</span>` : ''}
                                </div>
                            </div>
                        `).join('') : ''}

                        ${sectionVisible('education') && educationItems.length > 0 ? `<div class="section-title">教育背景</div>` : ''}
                        ${sectionVisible('education') ? educationItems.map(item => `
                            <div class="item">
                                <div class="item-header">
                                    <span class="item-title">${escapeHtml(item.school || '学校')}</span>
                                    <span class="item-date">${escapeHtml(item.date || '')}</span>
                                </div>
                                <div class="item-subtitle">${escapeHtml(item.major || '专业')}</div>
                            </div>
                        `).join('') : ''}
                    </div>
                </div>
            `;
        } else if (currentTemplate === 'ats') {
            container.innerHTML = `
                <div class="resume-ats">
                    ${p.showBasic ? `
                        <header class="ats-header">
                            <div class="ats-name">${escapeHtml(b.name || '姓名')}</div>
                            <div class="ats-target">${escapeHtml(b.job_target || '求职意向')}</div>
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    ${renderPreviewSections(p, ['summary', 'education', 'experience', 'projects', 'campus', 'awards', 'skills'])}
                </div>
            `;
        } else if (currentTemplate === 'minimal') {
            container.innerHTML = `
                <div class="resume-minimal">
                    ${p.showBasic ? `
                        <header class="minimal-header">
                            <div class="minimal-name">${escapeHtml(b.name || '姓名')}</div>
                            <div class="minimal-target">${escapeHtml(b.job_target || '')}</div>
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    ${renderPreviewSections(p, ['summary', 'experience', 'projects', 'campus', 'awards', 'education', 'skills'])}
                </div>
            `;
        } else if (currentTemplate === 'campus') {
            container.innerHTML = `
                <div class="resume-campus">
                    ${p.showBasic ? `
                        <header class="campus-header">
                            <div>
                                <div class="campus-name">${escapeHtml(b.name || '姓名')}</div>
                                <div class="campus-target">${escapeHtml(b.job_target || '求职意向')}</div>
                            </div>
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    ${renderPreviewSections(p, ['summary', 'education', 'campus', 'awards', 'projects', 'experience', 'skills'])}
                </div>
            `;
        } else if (currentTemplate === 'business') {
            container.innerHTML = `
                <div class="resume-business">
                    <aside class="business-side">
                        ${p.showBasic ? `
                            <div class="business-name">${escapeHtml(b.name || '姓名')}</div>
                            <div class="business-target">${escapeHtml(b.job_target || '')}</div>
                            ${renderPreviewSection('联系方式', renderPreviewContact(b))}
                        ` : ''}
                        ${renderPreviewSections(p, ['skills', 'awards'])}
                    </aside>
                    <main class="business-main">
                        ${renderPreviewSections(p, ['summary', 'experience', 'projects', 'campus', 'education'])}
                    </main>
                </div>
            `;
        } else if (currentTemplate === 'creative') {
            container.innerHTML = `
                <div class="resume-creative">
                    ${p.showBasic ? `
                        <header class="creative-header">
                            <div class="creative-name">${escapeHtml(b.name || '姓名')}</div>
                            <div class="creative-target">${escapeHtml(b.job_target || '求职意向')}</div>
                            ${renderPreviewContact(b)}
                        </header>
                    ` : ''}
                    <div class="creative-body">
                        ${renderPreviewSections(p, ['summary', 'projects', 'experience', 'campus', 'awards', 'education', 'skills'])}
                    </div>
                </div>
            `;
        } else if (currentTemplate === 'tech') {
            container.innerHTML = `
                <div class="resume-tech">
                    <aside class="tech-side">
                        ${p.showBasic ? `
                            <div class="tech-name">${escapeHtml(b.name || '姓名')}</div>
                            <div class="tech-target">${escapeHtml(b.job_target || '')}</div>
                            ${renderPreviewSection('联系方式', renderPreviewContact(b))}
                        ` : ''}
                        ${renderPreviewSections(p, ['skills', 'awards'])}
                    </aside>
                    <main class="tech-main">
                        ${renderPreviewSections(p, ['summary', 'projects', 'experience', 'campus', 'education'])}
                    </main>
                </div>
            `;
        } else {
            // Classic Template
            container.innerHTML = `
                <div class="resume-classic">
                    ${showBasic ? `
                        <div class="header">
                            <div class="name">${escapeHtml(b.name || '姓名')}</div>
                            <div class="contact">
                                ${escapeHtml(b.phone || '')} | ${escapeHtml(b.email || '')} | ${escapeHtml(b.location || '')}
                            </div>
                            <div class="contact">求职意向：${escapeHtml(b.job_target || '')}</div>
                        </div>

                        <div class="section-title">自我评价</div>
                        <p class="item-desc">${escapeHtml(b.self_evaluation || '')}</p>
                    ` : ''}

                    ${sectionVisible('education') && educationItems.length > 0 ? `<div class="section-title">教育背景</div>` : ''}
                    ${sectionVisible('education') ? educationItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${escapeHtml(item.school || '')} - ${escapeHtml(item.major || '')}</span>
                                <span>${escapeHtml(item.date || '')}</span>
                            </div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('experience') && experienceItems.length > 0 ? `<div class="section-title">工作经历</div>` : ''}
                    ${sectionVisible('experience') ? experienceItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${escapeHtml(item.company || '')} - ${escapeHtml(item.position || '')}</span>
                                <span>${escapeHtml(item.date || '')}</span>
                            </div>
                            <div class="item-desc">${escapeHtml(item.description || '')}</div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('projects') && projectItems.length > 0 ? `<div class="section-title">项目经验</div>` : ''}
                    ${sectionVisible('projects') ? projectItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${escapeHtml(item.name || '')} - ${escapeHtml(item.role || '')}</span>
                                <span>${escapeHtml(item.date || '')}</span>
                            </div>
                            <div class="item-desc">${escapeHtml(item.description || '')}</div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('campus_experience') && campusItems.length > 0 ? `<div class="section-title">校园内经历</div>` : ''}
                    ${sectionVisible('campus_experience') ? campusItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${escapeHtml(item.organization || '')} - ${escapeHtml(item.position || '')}</span>
                            </div>
                            <div class="item-desc">${escapeHtml(item.achievements || '')}</div>
                        </div>
                    `).join('') : ''}

                    ${sectionVisible('awards') && awardItems.length > 0 ? `<div class="section-title">获奖</div>` : ''}
                    ${sectionVisible('awards') ? awardItems.map(item => `
                        <div class="item">
                            <div class="item-header">
                                <span>${escapeHtml(item.name || '')} - ${escapeHtml(item.rank || '')}</span>
                                <span>${escapeHtml(item.level || '')}</span>
                            </div>
                        </div>
                    `).join('') : ''}

                    ${showSkills ? `
                        <div class="section-title">技能</div>
                        <p class="item-desc">${skillItems.map(escapeHtml).join(' / ')}</p>
                    ` : ''}
                </div>
            `;
        }

        applyLayoutDensity(getLayoutDensity(), false);
    }

    function changeTemplate(tpl) {
        currentTemplate = tpl;
        renderPreview();
    }

    function nextPaint() {
        return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    function getA4HeightPx() {
        const probe = document.createElement('div');
        probe.style.position = 'absolute';
        probe.style.visibility = 'hidden';
        probe.style.pointerEvents = 'none';
        probe.style.height = '297mm';
        probe.style.width = '1px';
        document.body.appendChild(probe);
        const height = probe.getBoundingClientRect().height;
        probe.remove();
        return height;
    }

    function previewFitsOnePage() {
        const container = document.getElementById('resume-preview');
        if (!container) return true;
        return container.scrollHeight <= getA4HeightPx() + 4;
    }

    async function fitOnePage() {
        const btn = document.getElementById('btn-fit-one-page');
        const originalText = btn.innerText;
        btn.innerText = '调整中...';
        btn.disabled = true;

        try {
            renderPreview();
            let fittedDensity = layoutPresets.length - 1;

            for (let density = 0; density < layoutPresets.length; density++) {
                applyLayoutDensity(density);
                await nextPaint();

                if (previewFitsOnePage()) {
                    fittedDensity = density;
                    break;
                }
            }

            applyLayoutDensity(fittedDensity);
            await nextPaint();

            if (!previewFitsOnePage()) {
                alert('已调整到最紧凑排版，但当前内容可能仍超过一页。可以尝试隐藏部分模块或精简内容。');
            }
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function exportPDF() {
        const originalTitle = document.title;
        const name = resumeData.basic.name || '简历';
        document.title = `${name}_简历`;
        window.print();
        setTimeout(() => {
            document.title = originalTitle;
        }, 1000);
    }
</script>
{% endblock %}
