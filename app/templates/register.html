<!DOCTYPE html>
<html data-theme="cupcake" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI 模拟面试</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-primary: #ea580c;
            --theme-primary-hover: #c2410c;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', 'Noto Sans SC', sans-serif;
            color: #292524;
            background-color: #fdfbf7;
            background-image: radial-gradient(#ece7df 1.4px, transparent 1.4px);
            background-size: 24px 24px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background:
                radial-gradient(circle at 10% 10%, rgba(251, 146, 60, 0.2), transparent 34%),
                radial-gradient(circle at 90% 18%, rgba(56, 189, 248, 0.14), transparent 28%);
        }

        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.25rem;
        }

        .auth-card {
            width: min(640px, 100%);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: rgba(255, 255, 255, 0.74);
            backdrop-filter: blur(22px) saturate(170%);
            -webkit-backdrop-filter: blur(22px) saturate(170%);
            box-shadow:
                0 24px 45px -30px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            padding: 1.9rem;
        }

        .brand-chip {
            width: 2.9rem;
            height: 2.9rem;
            border-radius: 1rem;
            display: grid;
            place-items: center;
            margin: 0 auto 0.9rem;
            color: #fff;
            background: linear-gradient(135deg, var(--theme-primary), #fb923c);
            box-shadow: 0 14px 24px -18px rgba(234, 88, 12, 0.78);
        }

        .input,
        .select {
            border-radius: 0.9rem !important;
            border-color: #e7e5e4 !important;
            background: rgba(255, 255, 255, 0.95) !important;
        }

        .input:focus,
        .select:focus {
            border-color: rgba(234, 88, 12, 0.45) !important;
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1);
            outline: none;
        }

        .btn {
            border-radius: 0.95rem;
            font-weight: 700;
        }

        .btn-primary {
            border: none !important;
            color: #fff !important;
            background: linear-gradient(135deg, var(--theme-primary), #fb923c) !important;
            box-shadow: 0 16px 24px -20px rgba(234, 88, 12, 0.85);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--theme-primary-hover), #f97316) !important;
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="brand-chip">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </div>

            <h1 class="text-center text-2xl font-extrabold text-stone-700">创建账号</h1>
            <p class="text-center text-sm text-stone-400 mt-1">完成注册后即可开始使用 AI 模拟面试平台</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-warning text-sm py-2 mt-5 mb-2"><span>{{ messages[0] }}</span></div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="mt-5 space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="form-control w-full">
                        <label class="label py-1"><span class="label-text text-stone-600">账号</span></label>
                        <input type="text" name="username" placeholder="请输入用户名" class="input input-bordered w-full" required />
                    </div>
                    <div class="form-control w-full">
                        <label class="label py-1"><span class="label-text text-stone-600">真实姓名</span></label>
                        <input type="text" name="truename" placeholder="请输入姓名" class="input input-bordered w-full" required />
                    </div>
                </div>

                <div class="form-control w-full">
                    <label class="label py-1"><span class="label-text text-stone-600">密码</span></label>
                    <input type="password" name="password" placeholder="请输入密码" class="input input-bordered w-full" required />
                </div>

                <div class="divider text-xs text-stone-400 my-3">身份信息</div>

                <div class="form-control w-full">
                    <label class="label py-1"><span class="label-text text-stone-600">选择身份</span></label>
                    <select id="role" name="role" class="select select-bordered" onchange="toggleFields(this.value)">
                        <option value="student">学生</option>
                        <option value="teacher">班主任</option>
                        <option value="dept_head">系部负责人</option>
                        <option value="admin">学校负责人</option>
                    </select>
                </div>

                <div id="org-fields" class="grid md:grid-cols-2 gap-4">
                    <div class="form-control w-full">
                        <label class="label py-1"><span class="label-text text-stone-600">所属系部</span></label>
                        <input type="text" id="department" name="department" placeholder="如：数字经济系" class="input input-bordered w-full" />
                    </div>
                    <div class="form-control w-full">
                        <label class="label py-1"><span class="label-text text-stone-600">所属班级</span></label>
                        <input type="text" id="class_name" name="class_name" placeholder="如：23计应1班" class="input input-bordered w-full" />
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-1">注 册</button>
            </form>

            <div class="divider text-xs text-stone-400 my-5">已有账号？</div>
            <a href="{{ url_for('auth.login') }}" class="btn btn-ghost btn-sm w-full text-stone-600">去登录</a>
        </div>
    </div>

    <script>
        function toggleFields(role) {
            const wrapper = document.getElementById('org-fields');
            const department = document.getElementById('department');
            const className = document.getElementById('class_name');
            const needsOrg = ['student', 'teacher', 'dept_head'].includes(role);

            wrapper.classList.toggle('hidden', !needsOrg);

            if (!needsOrg) {
                department.value = '';
                className.value = '';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const roleSelect = document.getElementById('role');
            toggleFields(roleSelect.value);
        });
    </script>
</body>
</html>
