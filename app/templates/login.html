<!DOCTYPE html>
<html data-theme="cupcake" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 嘉善技师学院AI智聘平台</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --canvas: #f5efe6;
            --panel: rgba(255, 251, 245, 0.84);
            --line: rgba(120, 87, 57, 0.18);
            --primary: #c7682f;
            --primary-deep: #9f4d1e;
            --text-main: #473221;
            --text-soft: #8d725a;
            --shadow: 0 30px 80px -42px rgba(70, 40, 10, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', 'Noto Sans SC', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(220, 168, 119, 0.28), transparent 28%),
                radial-gradient(circle at right 15%, rgba(255, 220, 178, 0.4), transparent 22%),
                linear-gradient(180deg, #f8f2e9 0%, #f3eadf 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: auto;
            pointer-events: none;
            z-index: 0;
            border-radius: 999px;
            filter: blur(10px);
        }

        body::before {
            width: 18rem;
            height: 18rem;
            top: -4rem;
            left: -4rem;
            background: rgba(246, 189, 96, 0.18);
        }

        body::after {
            width: 22rem;
            height: 22rem;
            right: -8rem;
            bottom: -8rem;
            background: rgba(214, 126, 58, 0.12);
        }

        .login-page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-stage {
            width: min(1120px, 100%);
        }

        .stage-title {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .stage-title h1 {
            margin: 0;
            font-size: clamp(2rem, 3.2vw, 3.2rem);
            font-weight: 800;
            letter-spacing: 0.06em;
            color: #3b2716;
        }

        .stage-title p {
            margin: 0.6rem 0 0;
            color: var(--text-soft);
            font-size: 0.98rem;
            letter-spacing: 0.08em;
        }

        .stage-panel {
            position: relative;
            min-height: 640px;
            border: 1px solid var(--line);
            border-radius: 2rem;
            background: linear-gradient(135deg, rgba(255, 252, 246, 0.92), rgba(250, 243, 234, 0.86));
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 2rem;
        }

        .stage-panel::before {
            content: '';
            position: absolute;
            inset: 1rem;
            border: 1px solid rgba(199, 143, 87, 0.12);
            border-radius: 1.5rem;
            pointer-events: none;
        }

        .stage-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(280px, 0.92fr) minmax(340px, 1fr);
            gap: 2rem;
            min-height: 100%;
            align-items: stretch;
        }

        .ip-zone {
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            min-height: 540px;
            padding: 0.5rem 0;
        }

        .ip-blob {
            width: min(100%, 360px);
            min-height: 500px;
            border: 2px dashed rgba(199, 104, 47, 0.46);
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.75), transparent 30%),
                linear-gradient(180deg, rgba(255, 242, 223, 0.92), rgba(248, 229, 205, 0.75));
            border-radius: 42% 58% 53% 47% / 36% 33% 67% 64%;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            color: #a3653d;
        }

        .ip-blob strong {
            font-size: 1.35rem;
            letter-spacing: 0.08em;
        }

        .ip-blob span {
            margin-top: 0.9rem;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #9b7c64;
        }

        .login-side {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0.5rem 1rem 0;
        }

        .login-card {
            width: min(100%, 480px);
            border-radius: 1.6rem;
            border: 1px solid rgba(199, 143, 87, 0.14);
            background: var(--panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 20px 50px -36px rgba(95, 61, 31, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            padding: 2.1rem 2rem;
        }

        .login-card h2 {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 800;
            color: #412a19;
        }

        .login-card p {
            margin: 0.55rem 0 0;
            color: var(--text-soft);
            font-size: 0.97rem;
            line-height: 1.7;
        }

        .alert {
            border-radius: 1rem;
            margin-top: 1.2rem;
        }

        .login-form {
            margin-top: 1.6rem;
        }

        .field {
            margin-bottom: 1rem;
        }

        .field label {
            display: block;
            margin-bottom: 0.55rem;
            font-size: 0.92rem;
            font-weight: 700;
            color: #6b4d35;
            letter-spacing: 0.04em;
        }

        .input {
            height: 3.35rem;
            border-radius: 1rem !important;
            border-color: rgba(186, 144, 111, 0.32) !important;
            background: rgba(255, 255, 255, 0.96) !important;
            color: var(--text-main) !important;
            font-size: 1rem;
        }

        .input::placeholder {
            color: #b09783;
        }

        .input:focus {
            border-color: rgba(199, 104, 47, 0.42) !important;
            box-shadow: 0 0 0 4px rgba(199, 104, 47, 0.1);
            outline: none;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.6rem;
        }

        .btn {
            height: 3.2rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.16em;
        }

        .btn-primary {
            border: none !important;
            color: #fff !important;
            background: linear-gradient(135deg, var(--primary), #db8b4c) !important;
            box-shadow: 0 18px 26px -22px rgba(159, 77, 30, 0.9);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-deep), #cf7a39) !important;
        }

        .btn-secondary-soft {
            border: 1px solid rgba(199, 104, 47, 0.22) !important;
            color: var(--primary-deep) !important;
            background: rgba(255, 248, 240, 0.92) !important;
        }

        .btn-secondary-soft:hover {
            background: rgba(250, 238, 225, 0.98) !important;
        }

        .helper-text {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.88rem;
            color: #aa8b72;
        }

        @media (max-width: 960px) {
            .login-page {
                padding: 1rem;
            }

            .stage-panel {
                min-height: auto;
                padding: 1.2rem;
            }

            .stage-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }

            .ip-zone {
                min-height: auto;
                justify-content: center;
                padding-top: 0.4rem;
            }

            .ip-blob {
                min-height: 260px;
                width: min(100%, 420px);
                border-radius: 2rem;
            }

            .login-side {
                padding: 0;
            }
        }

        @media (max-width: 640px) {
            .stage-title {
                margin-bottom: 1.2rem;
            }

            .stage-title h1 {
                letter-spacing: 0.03em;
            }

            .stage-title p {
                font-size: 0.9rem;
                letter-spacing: 0.04em;
            }

            .login-card {
                padding: 1.5rem 1.1rem;
            }

            .action-row {
                grid-template-columns: 1fr;
            }

            .btn {
                letter-spacing: 0.08em;
            }
        }
    </style>
</head>
<body>
    <main class="login-page">
        <section class="login-stage">
            <header class="stage-title">
                <h1>嘉善技师学院AI智聘平台</h1>
                <p>JiaShan Technician College AI Recruitment Platform</p>
            </header>

            <div class="stage-panel">
                <div class="stage-grid">
                    <div class="ip-zone">
                        <div class="ip-blob" aria-label="IP形象预留区">
                            <strong>IP 形象预留区</strong>
                            <span>这里预留给后续学院吉祥物 / 数字人形象展示<br>当前先保留版位，不放具体图片</span>
                        </div>
                    </div>

                    <div class="login-side">
                        <div class="login-card">
                            <h2>欢迎登录</h2>
                            <p>请输入账号与密码，进入平台继续使用招聘、面试与管理功能。</p>

                            {% with messages = get_flashed_messages() %}
                                {% if messages %}
                                    <div class="alert alert-error text-sm py-2">
                                        <span>{{ messages[0] }}</span>
                                    </div>
                                {% endif %}
                            {% endwith %}

                            <form method="POST" class="login-form">
                                <div class="field">
                                    <label for="username">账号</label>
                                    <input id="username" type="text" name="username" placeholder="请输入用户名" class="input input-bordered w-full" required />
                                </div>

                                <div class="field">
                                    <label for="password">密码</label>
                                    <input id="password" type="password" name="password" placeholder="请输入密码" class="input input-bordered w-full" required />
                                </div>

                                <div class="action-row">
                                    <button type="submit" class="btn btn-primary">登录</button>
                                    <a href="{{ url_for('auth.register') }}" class="btn btn-secondary-soft">注册</a>
                                </div>
                            </form>

                            <div class="helper-text">建议使用学院统一账号登录</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
