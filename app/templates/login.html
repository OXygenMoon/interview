<!DOCTYPE html>
<html data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <title>登录 - AI 模拟面试</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />   <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 h-screen flex items-center justify-center">
    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title justify-center text-2xl font-bold mb-4">欢迎回来 👋</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-error text-sm py-2 mb-4">
                        <span>{{ messages[0] }}</span>
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">账号</span></label>
                    <input type="text" name="username" placeholder="请输入用户名" class="input input-bordered w-full" required />
                </div>
                <div class="form-control w-full mt-4">
                    <label class="label"><span class="label-text">密码</span></label>
                    <input type="password" name="password" placeholder="请输入密码" class="input input-bordered w-full" required />
                </div>
                <div class="card-actions justify-end mt-6">
                    <button type="submit" class="btn btn-primary w-full text-white">登 录</button>
                </div>
            </form>

            <div class="divider text-xs text-stone-400">还没有账号？</div>
            <a href="{{ url_for('auth.register') }}" class="btn btn-ghost btn-sm w-full">去注册</a>
        </div>
    </div>
</body>
</html>
